<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>사케 상품 메뉴판</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Noto Sans KR', sans-serif; background: #f4f6f9; color: #1a1a2e; min-height: 100vh; }
  .wrap { padding: 24px; }
  .top-bar { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px; margin-bottom: 18px; }
  .top-bar h1 { font-size: 20px; font-weight: 700; color: #0C447C; letter-spacing: -0.3px; }
  .legend { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
  .legend-item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: #555; }
  .legend-dot { width: 12px; height: 12px; border-radius: 50%; border: 1px solid rgba(0,0,0,0.1); }
  .controls { display: flex; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; align-items: center; }
  .controls input { flex: 1; min-width: 180px; padding: 8px 12px; font-size: 13px; font-family: inherit; border: 1px solid #ccd6e8; border-radius: 8px; background: #fff; color: #1a1a2e; outline: none; }
  .controls input:focus { border-color: #378ADD; }
  .controls select { padding: 8px 12px; font-size: 13px; font-family: inherit; border: 1px solid #ccd6e8; border-radius: 8px; background: #fff; color: #1a1a2e; cursor: pointer; outline: none; }
  .btn-print { padding: 8px 18px; font-size: 13px; font-family: inherit; border: 1px solid #378ADD; border-radius: 8px; background: #fff; color: #185FA5; cursor: pointer; font-weight: 500; }
  .btn-print:hover { background: #E6F1FB; }
  .count-info { font-size: 12px; color: #666; margin-bottom: 12px; }
  .grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 8px; }

  /* 카드 */
  .card { border-radius: 10px; padding: 20px 8px 10px; display: flex; flex-direction: column; align-items: center; gap: 5px; border: 1px solid transparent; transition: transform 0.15s, box-shadow 0.15s; position: relative; overflow: hidden; }
  .card:hover { transform: translateY(-2px); box-shadow: 0 4px 12px rgba(24,95,165,0.15); }
  .img-wrap { width: 54px; height: 76px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; overflow: hidden; }
  .card img { width: 100%; height: 100%; object-fit: contain; border-radius: 4px; display: block; }
  .img-placeholder { width: 54px; height: 76px; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 26px; opacity: 0.4; }
  .card .name { font-size: 11px; font-weight: 500; text-align: center; line-height: 1.5; word-break: keep-all; }
  .card .price { font-size: 13px; font-weight: 700; margin-top: 2px; }

  /* 스티커 공통 */
  .badge { position: absolute; left: 6px; width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 700; text-align: center; line-height: 1.2; word-break: keep-all; padding: 2px; box-shadow: 0 1px 4px rgba(0,0,0,0.18); }

  /* 주종 스티커 - 왼쪽 상단 */
  .badge-type { top: 6px; }
  .badge-soju    { background: #FFE5CC; border: 1.5px solid #FFB870; color: #A04800; } /* 소주 - 주황 */
  .badge-liqueur { background: #FFE0EE; border: 1.5px solid #FFB3D1; color: #9C1F5A; } /* 리큐르 - 분홍 */

  /* 용량 스티커 - 주종 아래 (top: 40px) */
  .badge-vol { top: 38px; }
  .badge-vol-300  { background: #E8F5E9; border: 1.5px solid #A5D6A7; color: #1B5E20; } /* 300ml - 연초록 */
  .badge-vol-500  { background: #FFF9E0; border: 1.5px solid #FFE082; color: #7B5800; } /* 500ml - 연노랑 */
  .badge-vol-1800 { background: #EDE7F6; border: 1.5px solid #B39DDB; color: #4527A0; } /* 1800ml - 연보라 */
  .badge-vol-other { background: #F3F3F3; border: 1.5px solid #BDBDBD; color: #424242; } /* 기타 - 회색 */

  /* 한정수량 스티커 - 상단 중앙 */
  .badge-sale { display: inline-block; border-radius: 6px; padding: 2px 7px; font-size: 8px; font-weight: 700; background: #FFF0F0; border: 1.5px solid #FFB3B3; color: #D62B2B; white-space: nowrap; line-height: 1.6; margin-top: 2px; }
  .badge-limit { display: inline-block; border-radius: 6px; padding: 2px 7px; font-size: 8px; font-weight: 700; background: #FFF0F0; border: 1.5px solid #FFB3B3; color: #D62B2B; box-shadow: 0 1px 4px rgba(214,43,43,0.15); white-space: nowrap; line-height: 1.6; }

  /* 부스번호 스티커 - 오른쪽 상단 네모 */
  .badge-booth { position: absolute; top: 6px; right: 6px; left: auto; width: auto; height: auto; border-radius: 5px; padding: 2px 6px; font-size: 10px; font-weight: 700; background: rgba(255,255,255,0.85); border: 1.5px solid rgba(255,255,255,0.9); color: #185FA5; box-shadow: 0 1px 4px rgba(0,0,0,0.12); white-space: nowrap; line-height: 1.6; }

  /* 카드 상단 색띠 */
  .card::before { content: ""; position: absolute; top: 0; left: 0; right: 0; height: 7px; border-radius: 10px 10px 0 0; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  .tier-1::before { background: #7BB8E8; }
  .tier-2::before { background: #4A9DD4; }
  .tier-3::before { background: #2478BF; }
  .tier-4::before { background: #185FA5; }
  .tier-5::before { background: #0C447C; }
  .tier-6::before { background: #042C53; }

  /* 파란색 6단계 */
  .tier-1 { background: #EBF4FD; border-color: #C2DDF7; }
  .tier-1 .name, .tier-1 .price { color: #185FA5; }
  .tier-1 .img-placeholder { background: #EBF4FD; }
  .tier-2 { background: #CCE4F8; border-color: #8BBDE9; }
  .tier-2 .name, .tier-2 .price { color: #0E4D8A; }
  .tier-2 .img-placeholder { background: #CCE4F8; }
  .tier-3 { background: #A3C9EF; border-color: #4D96D9; }
  .tier-3 .name, .tier-3 .price { color: #0C3E72; }
  .tier-3 .img-placeholder { background: #A3C9EF; }
  .tier-4 { background: #5FA4DC; border-color: #2478BF; }
  .tier-4 .name, .tier-4 .price { color: #0C3E72; }
  .tier-4 .img-placeholder { background: #5FA4DC; }
  .tier-5 { background: #2165A8; border-color: #0C447C; }
  .tier-5 .name, .tier-5 .price { color: #D6EAFB; }
  .tier-5 .img-placeholder { background: #2165A8; }
  .tier-6 { background: #0C3060; border-color: #042C53; }
  .tier-6 .name, .tier-6 .price { color: #A8CFF0; }
  .tier-6 .img-placeholder { background: #0C3060; }

  .loading, .error { grid-column: 1 / -1; text-align: center; padding: 50px 20px; font-size: 14px; color: #666; line-height: 2; }
  .error { color: #c0392b; }

  /* 모바일 반응형 */
  @media (max-width: 600px) {
    .grid { grid-template-columns: repeat(2, 1fr); gap: 8px; }
    .wrap { padding: 12px; }
    .top-bar { flex-direction: column; align-items: flex-start; }
    .top-bar h1 { font-size: 16px; }
    .legend { gap: 6px; }
    .controls { flex-direction: column; }
    .controls input, .controls select { width: 100%; }
  }
  @media (min-width: 601px) and (max-width: 900px) {
    .grid { grid-template-columns: repeat(3, 1fr); gap: 8px; }
  }

  @media print {
    * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
    body { background: #fff; }

    /* 범례 표시, 컨트롤 숨김 */
    .controls, .btn-print, .count-info { display: none !important; }
    .legend { display: flex !important; flex-wrap: wrap; gap: 6px; margin-top: 3mm; }
    .legend-item { font-size: 8px; color: #333 !important; }
    .legend-dot { width: 10px; height: 10px; -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }

    .wrap { padding: 6mm 8mm; }
    .top-bar { margin-bottom: 2mm; flex-direction: row; align-items: center; gap: 8px; flex-wrap: wrap; }
    .top-bar h1 { font-size: 12px; margin: 0; }
    .legend-item { font-size: 7px !important; }
    .legend-dot { width: 8px !important; height: 8px !important; }
    .legend { gap: 5px !important; margin-top: 0 !important; }

    /* 6열 5행 고정 */
    .grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 4px; }

    /* 카드 배경 흰색, 색띠만 유지 */
    .card {
      padding: 14px 5px 8px;
      page-break-inside: avoid;
      break-inside: avoid;
      background: #fff !important;
      border: 1px solid #ccc !important;
      box-shadow: none !important;
      transform: none !important;
    }
    .card::before { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }

    /* tier별 글자색 - 인쇄용 진한색 */
    .tier-1 .name, .tier-1 .price { color: #2478BF !important; }
    .tier-2 .name, .tier-2 .price { color: #185FA5 !important; }
    .tier-3 .name, .tier-3 .price { color: #0E4D8A !important; }
    .tier-4 .name, .tier-4 .price { color: #0C3E72 !important; }
    .tier-5 .name, .tier-5 .price { color: #0C447C !important; }
    .tier-6 .name, .tier-6 .price { color: #042C53 !important; }
    .card .name { font-size: 9px !important; }
    .card .price { font-size: 11px !important; font-weight: 700; }

    .card img { width: 58px; height: 78px; }
    .img-placeholder { width: 58px; height: 78px; font-size: 22px; }

    /* 스티커 */
    .badge { width: 22px; height: 22px; font-size: 7px; -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
    .badge-vol { top: 30px; }
    .badge-booth { font-size: 7px !important; padding: 1px 4px; color: #185FA5 !important; }
  }
  @page { size: A4 portrait; margin: 8mm 10mm; }
</style>
</head>
<body>
<div class="wrap">
  <div class="top-bar">
    <h1>🍶 일로사케 현장판매</h1>
    <div class="legend">
      <div class="legend-item"><div class="legend-dot" style="background:#EBF4FD;border-color:#C2DDF7"></div>1~2만원</div>
      <div class="legend-item"><div class="legend-dot" style="background:#CCE4F8;border-color:#8BBDE9"></div>3만원대</div>
      <div class="legend-item"><div class="legend-dot" style="background:#A3C9EF;border-color:#4D96D9"></div>4만원대</div>
      <div class="legend-item"><div class="legend-dot" style="background:#5FA4DC;border-color:#2478BF"></div>5만원대</div>
      <div class="legend-item"><div class="legend-dot" style="background:#2165A8;border-color:#0C447C"></div>7~9만원</div>
      <div class="legend-item"><div class="legend-dot" style="background:#0C3060;border-color:#042C53"></div>10만원↑</div>
      <div style="width:1px;height:14px;background:#ddd;margin:0 2px"></div>
      <div class="legend-item"><div class="legend-dot" style="background:#FFE5CC;border-color:#FFB870"></div>소주</div>
      <div class="legend-item"><div class="legend-dot" style="background:#FFE0EE;border-color:#FFB3D1"></div>리큐르</div>
      <div style="width:1px;height:14px;background:#ddd;margin:0 2px"></div>
      <div class="legend-item"><div class="legend-dot" style="background:#E8F5E9;border-color:#A5D6A7"></div>300ml</div>
      <div class="legend-item"><div class="legend-dot" style="background:#FFF9E0;border-color:#FFE082"></div>500ml</div>
      <div class="legend-item"><div class="legend-dot" style="background:#EDE7F6;border-color:#B39DDB"></div>1800ml</div>
    </div>
  </div>

  <div class="controls">
    <input type="text" id="search" placeholder="상품명 / 주종 검색..." oninput="renderCards()">
    <select id="tierFilter" onchange="renderCards()">
      <option value="">가격대 전체</option>
      <option value="1">1~2만원</option>
      <option value="2">3만원대</option>
      <option value="3">4만원대</option>
      <option value="4">5만원대</option>
      <option value="5">7~9만원</option>
      <option value="6">10만원↑</option>
    </select>
    <select id="typeFilter" onchange="renderCards()">
      <option value="">주종 전체</option>
    </select>
    <button class="btn-print" onclick="window.print()">🖨 인쇄 / PDF 저장</button>
  </div>

  <div class="count-info" id="countInfo"></div>
  <div class="grid" id="grid">
    <div class="loading">📊 데이터 불러오는 중...</div>
  </div>
</div>

<script>
/*
==============================================
  ✏️ 수정 가이드
==============================================

【1】구글 시트가 바뀌었을 때 → CSV_URL 교체
  - 구글 시트 → 파일 → 웹에 게시 → CSV → 게시
  - 생성된 URL을 아래 CSV_URL에 붙여넣기

【2】열 위치가 바뀌었을 때 → COL_* 숫자 수정
  - A=0, B=1, C=2, D=3, E=4, F=5, G=6, H=7, I=8, J=9 ...
  - 예) 상품명이 E열로 이동 → COL_NAME = 4

【3】이미지가 안 뜰 때 → IMG_BASE 확인
  - 이미지는 sake-proposal 레포 루트에 저장
  - 파일명이 구글 시트 상품명과 정확히 일치해야 함

【4】판매 여부 기준 변경 시 → COL_COND 열 + "판매" 텍스트
  - 코드에서 cell(COL_COND) !== '판매' 부분 수정

【5】부스번호 열이 바뀌었을 때 → COL_BOOTH_A, COL_BOOTH_B 수정
  - B열(=1), C열(=2) 조합으로 "H-4" 형식 표시

【6】한정수량 열이 바뀌었을 때 → COL_LIMIT 수정
  - M열(=12), 값이 있으면 카드 상단 중앙에 빨간 스티커로 표시
  - B열(=1), C열(=2) 조합으로 "H-4" 형식 표시
  - 오른쪽 상단 네모 스티커로 표기됨
  - 코드에서 cell(COL_COND) !== '판매' 부분 수정
==============================================
*/

const COL_LIMIT  = 12; // M열: 한정수량 (예: 1일 3병)
const COL_BOOTH_A = 1;  // B열: 부스번호 앞자리 (예: H)
const COL_BOOTH_B = 2;  // C열: 부스번호 뒷자리 (예: 4)
const COL_NAME  = 5;  // F열: 상품명
const COL_VOL   = 6;  // G열: 용량
const COL_TYPE  = 7;  // H열: 주종
const COL_COND  = 8;  // I열: 판매 여부 ("판매" 텍스트인 행만 표시)
const COL_SALE  = 9;  // J열: 특별할인가 내용 (있으면 🏷 뱃지 표시)
const COL_PRICE = 10; // K열: 판매가
const COL_IMG   = -1; // 미사용
const IMG_BASE  = "https://natui714.github.io/sake-proposal/"; // 이미지 베이스 URL (sake-proposal 레포 루트)

const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQzFPLqoQx5PgPPL2yME9GoTa1I2wVL0VVXbizbTn3090EIOGy6AxN492bnkIFBfGSmxOaZOtsiwNMS/pub?output=csv';

let allProducts = [];

function getTier(price) {
  if (price <= 20000) return 1;
  if (price <= 39999) return 2;
  if (price <= 49999) return 3;
  if (price <= 59999) return 4;
  if (price <= 99999) return 5;
  return 6;
}

function getTypeBadge(type) {
  if (!type) return '';
  const t = type.trim();
  if (t.includes('소주')) return `<div class="badge badge-type badge-soju">${t}</div>`;
  if (t.includes('리큐르') || t.includes('liqueur')) return `<div class="badge badge-type badge-liqueur">${t}</div>`;
  return ''; // 사케는 표시 안 함
}

function getVolBadge(vol, hasType) {
  if (!vol) return '';
  const v = vol.toString().replace(/[^0-9]/g, '');
  if (v === '720') return ''; // 720ml 제외
  // 주종 스티커가 있으면 아래로, 없으면 상단에
  const topClass = hasType ? 'badge-vol' : 'badge-type';
  if (v === '300')  return `<div class="badge ${topClass} badge-vol-300">${vol}</div>`;
  if (v === '500')  return `<div class="badge ${topClass} badge-vol-500">${vol}</div>`;
  if (v === '1800') return `<div class="badge ${topClass} badge-vol-1800">${vol}</div>`;
  return `<div class="badge ${topClass} badge-vol-other">${vol}</div>`;
}

function renderCards() {
  const search = document.getElementById('search').value.toLowerCase();
  const tierFilter = document.getElementById('tierFilter').value;
  const typeFilter = document.getElementById('typeFilter').value;

  const filtered = allProducts.filter(p =>
    (!search || p.name.toLowerCase().includes(search) || p.type.toLowerCase().includes(search)) &&
    (!tierFilter || String(p.tier) === tierFilter) &&
    (!typeFilter || p.type === typeFilter)
  );

  document.getElementById('countInfo').textContent = `총 ${filtered.length}개 상품`;

  if (!filtered.length) {
    document.getElementById('grid').innerHTML = '<div class="loading">검색 결과가 없습니다</div>';
    return;
  }

  document.getElementById('grid').innerHTML = filtered.map(p => {
    const showType = p.type && !p.type.includes('사케') && (p.type.includes('소주') || p.type.includes('리큐르'));
    const typeBadge = getTypeBadge(p.type);
    const volBadge  = getVolBadge(p.vol, showType);
    return `
    <div class="card tier-${p.tier}">
      ${typeBadge}
      ${p.booth ? `<div class="badge badge-booth">${p.booth}</div>` : ""}
      ${volBadge}
      <div class="img-wrap"><img src="${p.img}" alt="${p.name}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
      <div class="img-placeholder" style="display:none">🍶</div></div>
      ${p.limit ? `<div class="badge-limit">🔥 ${p.limit}</div>` : ""}
      <div class="name">${p.name}</div>
      <div class="price">${p.priceStr}</div>
      ${p.sale ? `<div class="badge-sale">🏷 ${p.sale}</div>` : ""}
    </div>`;
  }).join('');
}

function parseCSV(text) {
  const lines = text.trim().split('\n');
  lines.slice(1).forEach(line => {
    if (!line.trim()) return;
    const vals = [];
    let cur = '', inQ = false;
    for (const ch of line) {
      if (ch === '"') { inQ = !inQ; }
      else if (ch === ',' && !inQ) { vals.push(cur.trim()); cur = ''; }
      else cur += ch;
    }
    vals.push(cur.trim());
    const cell = i => (i >= 0 && vals[i] !== undefined) ? vals[i].replace(/^"|"$/g, '').trim() : '';
    if (cell(COL_COND) !== '판매') return;
    const name  = cell(COL_NAME);
    const price = parseInt(cell(COL_PRICE).replace(/[^0-9]/g, '')) || 0;
    const vol   = cell(COL_VOL);
    const type  = cell(COL_TYPE);
    const boothA = cell(COL_BOOTH_A);
    const boothB = cell(COL_BOOTH_B);
    const booth = (boothA && boothB) ? boothA + "-" + boothB : "";
    const limit = cell(COL_LIMIT).trim();
    const sale  = cell(COL_SALE).trim();
    const img = IMG_BASE + name.replace(/ /g, '%20') + ".png";
    if (!name || !price) return;
    allProducts.push({ name, vol, type, booth, limit, sale, img, price, priceStr: price.toLocaleString() + '원', tier: getTier(price) });
  });

  allProducts.sort((a, b) => a.price - b.price);

  if (!allProducts.length) {
    document.getElementById('grid').innerHTML =
      `<div class="error">I열이 "판매"인 상품이 없습니다.<br>시트 데이터를 확인해주세요.</div>`;
    return;
  }

  const types = [...new Set(allProducts.map(p => p.type).filter(Boolean))].sort();
  const sel = document.getElementById('typeFilter');
  types.forEach(t => {
    const opt = document.createElement('option');
    opt.value = t; opt.textContent = t;
    sel.appendChild(opt);
  });

  renderCards();
}

fetch(CSV_URL)
  .then(r => { if (!r.ok) throw new Error('HTTP ' + r.status); return r.text(); })
  .then(text => parseCSV(text))
  .catch(e => {
    document.getElementById('grid').innerHTML =
      `<div class="error">데이터 로드 실패: ${e.message}</div>`;
  });
