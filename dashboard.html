<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>창고별 출고수량 대시보드 | 일로사케 & 일로플러스</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chartjs-plugin-datalabels/2.2.0/chartjs-plugin-datalabels.min.js"></script>
<style>
  /* ── 기본 리셋 & 변수 ── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:       #f5f4f0;
    --surface:  #ffffff;
    --surface2: #f0efe9;
    --border:   rgba(0,0,0,0.09);
    --border2:  rgba(0,0,0,0.14);
    --text:     #1a1916;
    --text2:    #6b6a66;
    --text3:    #a09f9b;
    --accent:   #0891B2;
    --radius:   10px;
    --radius-lg:14px;
    --shadow:   0 1px 3px rgba(0,0,0,0.06), 0 4px 12px rgba(0,0,0,0.04);

    /* 창고 색상 */
    --c-bonsa:    #1D9E75;
    --c-busan:    #BA7517;
    --c-mul:      #378add;
    --c-jibang:   #D4537E;
    --c-taekbae:  #888780;

    /* 구분 색상 */
    --c-sake:   #3266ad;
    --c-plus:   #9d3d3d;
  }

  /* 다크모드 - 시스템 설정 */
  @media (prefers-color-scheme: dark) {
    :root:not([data-theme="light"]) {
      --bg:      #18181a;
      --surface: #232326;
      --surface2:#2c2c30;
      --border:  rgba(255,255,255,0.08);
      --border2: rgba(255,255,255,0.14);
      --text:    #f0efea;
      --text2:   #9a9994;
      --text3:   #6a6966;
    }
  }
  /* 수동 다크모드 */
  [data-theme="dark"] {
    --bg:      #18181a;
    --surface: #232326;
    --surface2:#2c2c30;
    --border:  rgba(255,255,255,0.08);
    --border2: rgba(255,255,255,0.14);
    --text:    #f0efea;
    --text2:   #9a9994;
    --text3:   #6a6966;
  }
  /* 수동 라이트모드 */
  [data-theme="light"] {
    --bg:       #f5f4f0;
    --surface:  #ffffff;
    --surface2: #f0efe9;
    --border:   rgba(0,0,0,0.09);
    --border2:  rgba(0,0,0,0.14);
    --text:     #1a1916;
    --text2:    #6b6a66;
    --text3:    #a09f9b;
  }

  /* ── 테마 토글 버튼 ── */
  .theme-toggle {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 6px 12px;
    border: 0.5px solid var(--border2);
    border-radius: 999px;
    background: var(--surface2);
    cursor: pointer;
    font-size: 12px;
    color: var(--text2);
    transition: background 0.2s, border-color 0.2s;
    user-select: none;
    white-space: nowrap;
  }
  .theme-toggle:hover { border-color: var(--accent); color: var(--accent); }
  .theme-toggle .toggle-track {
    width: 32px;
    height: 18px;
    border-radius: 999px;
    background: var(--border2);
    position: relative;
    transition: background 0.25s;
    flex-shrink: 0;
  }
  .theme-toggle .toggle-thumb {
    position: absolute;
    top: 2px; left: 2px;
    width: 14px; height: 14px;
    border-radius: 50%;
    background: var(--text3);
    transition: transform 0.25s, background 0.25s;
  }
  [data-theme="dark"] .theme-toggle .toggle-track,
  .theme-toggle.dark .toggle-track { background: var(--accent); }
  [data-theme="dark"] .theme-toggle .toggle-thumb,
  .theme-toggle.dark .toggle-thumb { transform: translateX(14px); background: #fff; }

  html { font-size: 15px; }
  body {
    font-family: 'Pretendard', 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    line-height: 1.6;
  }

  /* ── 레이아웃 ── */
  .page { max-width: 1280px; margin: 0 auto; padding: 0 20px 60px; }

  /* ── 헤더 ── */
  .header {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    padding: 28px 0 20px;
    border-bottom: 0.5px solid var(--border2);
    margin-bottom: 24px;
    flex-wrap: wrap;
    gap: 12px;
  }
  .header-left h1 {
    font-size: 22px;
    font-weight: 600;
    letter-spacing: -0.5px;
    color: var(--text);
  }
  .header-left p {
    font-size: 13px;
    color: var(--text2);
    margin-top: 3px;
  }
  .header-right {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .gas-input {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--surface);
    border: 0.5px solid var(--border2);
    border-radius: var(--radius);
    padding: 7px 12px;
  }
  .gas-input input {
    border: none;
    background: transparent;
    color: var(--text);
    font-size: 12px;
    width: 260px;
    outline: none;
  }
  .gas-input input::placeholder { color: var(--text3); }
  .btn {
    padding: 7px 14px;
    border-radius: var(--radius);
    border: 0.5px solid var(--border2);
    background: var(--surface);
    color: var(--text);
    font-size: 13px;
    cursor: pointer;
    transition: background 0.15s;
    white-space: nowrap;
  }
  .btn:hover { background: var(--surface2); }
  .btn.primary {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
  }
  .btn.primary:hover { opacity: 0.88; }

  /* ── 상태 배너 ── */
  .status-bar {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 14px;
    border-radius: var(--radius);
    font-size: 13px;
    margin-bottom: 20px;
  }
  .status-bar.info    { background: #e8f0fb; color: #1a4b92; border: 0.5px solid #b4caf4; }
  .status-bar.success { background: #e6f4ec; color: #1a6b3a; border: 0.5px solid #93d4aa; }
  .status-bar.error   { background: #fdecea; color: #8b1a1a; border: 0.5px solid #f4b4b4; }
  .status-bar.loading { background: var(--surface2); color: var(--text2); border: 0.5px solid var(--border2); }
  @media (prefers-color-scheme: dark) {
    .status-bar.info    { background: #1a2b4a; color: #9bbcf4; border-color: #2a4878; }
    .status-bar.success { background: #1a3028; color: #6ecf8a; border-color: #2a5838; }
    .status-bar.error   { background: #3a1a1a; color: #f49b9b; border-color: #6a2828; }
  }
  .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .dot.green  { background: #22c55e; }
  .dot.red    { background: #ef4444; }
  .dot.blue   { background: #3b82f6; }
  .dot.spin   { background: #6b7280; animation: spin-pulse 1s infinite; }
  @keyframes spin-pulse { 0%,100%{opacity:0.3} 50%{opacity:1} }

  /* ── 필터 바 ── */
  .filter-bar {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 20px;
    padding: 12px 14px;
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-lg);
    box-shadow: var(--shadow);
  }
  .filter-bar label {
    font-size: 11px;
    color: var(--text3);
    font-weight: 500;
    letter-spacing: 0.3px;
    text-transform: uppercase;
  }
  .filter-divider { width: 0.5px; height: 20px; background: var(--border2); margin: 0 2px; }
  .filter-reset {
    font-size: 12px;
    color: var(--text3);
    cursor: pointer;
    text-decoration: underline;
    background: none;
    border: none;
    padding: 0;
    white-space: nowrap;
  }
  .filter-reset:hover { color: var(--text2); }

  /* ── 멀티셀렉트 드롭다운 ── */
  .ms-wrap { position: relative; }
  .ms-trigger {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 5px 10px;
    border: 0.5px solid var(--border2);
    border-radius: var(--radius);
    background: var(--surface);
    color: var(--text);
    font-size: 13px;
    cursor: pointer;
    white-space: nowrap;
    min-width: 90px;
    user-select: none;
    transition: border-color 0.15s;
  }
  .ms-trigger:hover, .ms-trigger.open { border-color: var(--accent); }
  .ms-trigger.active { border-color: var(--accent); background: var(--surface2); }
  .ms-trigger .ms-label { flex: 1; }
  .ms-trigger .ms-arrow { font-size: 10px; color: var(--text3); transition: transform 0.2s; }
  .ms-trigger.open .ms-arrow { transform: rotate(180deg); }
  .ms-badge {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    background: var(--accent);
    color: #fff;
    font-size: 10px;
    font-weight: 600;
    border-radius: 999px;
    min-width: 16px;
    height: 16px;
    padding: 0 4px;
  }
  .ms-panel {
    position: absolute;
    top: calc(100% + 4px);
    left: 0;
    min-width: 160px;
    background: var(--surface);
    border: 0.5px solid var(--border2);
    border-radius: var(--radius);
    box-shadow: 0 4px 16px rgba(0,0,0,0.12);
    z-index: 900;
    padding: 6px 0;
    display: none;
  }
  .ms-panel.open { display: block; }
  .ms-option {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 7px 12px;
    font-size: 13px;
    color: var(--text);
    cursor: pointer;
    transition: background 0.1s;
  }
  .ms-option:hover { background: var(--surface2); }
  .ms-option input[type="checkbox"] {
    accent-color: var(--accent);
    width: 14px; height: 14px;
    cursor: pointer;
    flex-shrink: 0;
  }
  .ms-all { border-bottom: 0.5px solid var(--border); margin-bottom: 4px; font-weight: 500; color: var(--text2); }

  /* ── 월 범위 슬라이더 ── */
  .mon-range-wrap { position: relative; }
  .mon-range-trigger {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 5px 10px;
    border: 0.5px solid var(--border2);
    border-radius: var(--radius);
    background: var(--surface);
    color: var(--text);
    font-size: 13px;
    cursor: pointer;
    white-space: nowrap;
    min-width: 130px;
    user-select: none;
    transition: border-color 0.15s;
  }
  .mon-range-trigger:hover, .mon-range-trigger.open { border-color: var(--accent); }
  .mon-range-trigger.active { border-color: var(--accent); background: var(--surface2); }
  .mon-range-trigger .ms-arrow { font-size: 10px; color: var(--text3); transition: transform 0.2s; }
  .mon-range-trigger.open .ms-arrow { transform: rotate(180deg); }
  .mon-range-panel {
    position: absolute;
    top: calc(100% + 4px);
    left: 0;
    width: 280px;
    background: var(--surface);
    border: 0.5px solid var(--border2);
    border-radius: var(--radius);
    box-shadow: 0 4px 16px rgba(0,0,0,0.12);
    z-index: 900;
    padding: 14px 16px;
    display: none;
  }
  .mon-range-panel.open { display: block; }
  .mon-range-labels {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    color: var(--text2);
    margin-bottom: 8px;
    font-weight: 600;
  }
  .mon-slider-row {
    position: relative;
    height: 28px;
    display: flex;
    align-items: center;
    margin-bottom: 4px;
  }
  .mon-slider-track {
    position: absolute;
    left: 0; right: 0;
    height: 4px;
    background: var(--surface2);
    border-radius: 2px;
  }
  .mon-slider-fill {
    position: absolute;
    height: 4px;
    background: var(--accent);
    border-radius: 2px;
    pointer-events: none;
  }
  .mon-slider-row input[type="range"] {
    position: absolute;
    width: 100%;
    pointer-events: none;
    opacity: 0;
    height: 28px;
    cursor: pointer;
    margin: 0;
  }
  .mon-slider-row input[type="range"]::-webkit-slider-thumb {
    pointer-events: all;
    width: 16px; height: 16px;
    border-radius: 50%;
    background: var(--accent);
    cursor: pointer;
    -webkit-appearance: none;
    border: 2px solid #fff;
    box-shadow: 0 1px 4px rgba(0,0,0,0.2);
  }
  .mon-slider-row input[type="range"]::-moz-range-thumb {
    pointer-events: all;
    width: 14px; height: 14px;
    border-radius: 50%;
    background: var(--accent);
    cursor: pointer;
    border: 2px solid #fff;
  }
  .mon-month-list {
    display: flex;
    justify-content: space-between;
    margin-top: 6px;
  }
  .mon-month-tick {
    font-size: 10px;
    color: var(--text3);
    text-align: center;
    flex: 1;
    transition: color 0.15s, font-weight 0.15s;
  }
  .mon-month-tick.in-range { color: var(--accent); font-weight: 600; }
  .mon-quick-btns {
    display: flex;
    gap: 4px;
    margin-top: 10px;
    flex-wrap: wrap;
  }
  .mon-quick-btn {
    font-size: 11px;
    padding: 3px 8px;
    border: 0.5px solid var(--border2);
    border-radius: var(--radius);
    background: var(--surface2);
    color: var(--text2);
    cursor: pointer;
  }
  .mon-quick-btn:hover { border-color: var(--accent); color: var(--accent); }

  /* ── KPI 카드 ── */
  .kpi-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 12px;
    margin-bottom: 20px;
  }
  .kpi-card {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 16px 18px;
    box-shadow: var(--shadow);
    transition: transform 0.15s;
  }
  .kpi-card:hover { transform: translateY(-1px); }
  .kpi-label {
    font-size: 11px;
    font-weight: 500;
    color: var(--text3);
    letter-spacing: 0.4px;
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  .kpi-value {
    font-size: 26px;
    font-weight: 700;
    color: var(--text);
    letter-spacing: -1px;
    line-height: 1.1;
  }
  .kpi-unit { font-size: 13px; font-weight: 400; color: var(--text2); margin-left: 3px; }
  .kpi-sub { font-size: 11px; color: var(--text3); margin-top: 4px; }
  .kpi-card.accent { border-left: 3px solid var(--accent); }

  /* ── 차트 그리드 ── */
  .charts-row {
    display: grid;
    gap: 14px;
    margin-bottom: 14px;
  }
  .charts-row.two { grid-template-columns: 1fr 1fr; }
  .charts-row.full { grid-template-columns: 1fr; }

  .chart-card {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 18px 20px;
    box-shadow: var(--shadow);
  }
  .chart-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
  }
  .chart-title {
    font-size: 13px;
    font-weight: 600;
    color: var(--text2);
  }
  .legend {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    font-size: 11px;
    color: var(--text2);
    margin-bottom: 10px;
  }
  .legend-item { display: flex; align-items: center; gap: 5px; }
  .legend-dot { width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; }
  .chart-wrap { position: relative; }

  /* ── 상위 품목 테이블 ── */
  .top-card {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 18px 20px;
    box-shadow: var(--shadow);
    margin-bottom: 14px;
  }
  .top-list { list-style: none; }
  .top-item {
    display: grid;
    grid-template-columns: 22px 1fr minmax(80px,120px) 64px;
    align-items: center;
    gap: 10px;
    padding: 7px 0;
    border-bottom: 0.5px solid var(--border);
    font-size: 13px;
  }
  .top-item:last-child { border-bottom: none; }
  .top-rank { font-size: 11px; color: var(--text3); text-align: right; }
  .top-name { color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .top-bar-bg { background: var(--surface2); border-radius: 4px; height: 6px; }
  .top-bar-fill { height: 6px; border-radius: 4px; background: var(--accent); transition: width 0.4s; }
  .top-qty { font-weight: 600; color: var(--text); text-align: right; white-space: nowrap; }

  /* ── 품목 검색 ── */
  .prod-search-wrap {
    position: relative;
    display: flex;
    align-items: center;
  }
  .prod-search-input {
    padding: 6px 30px 6px 10px;
    border: 0.5px solid var(--border2);
    border-radius: var(--radius);
    background: var(--surface);
    color: var(--text);
    font-size: 13px;
    width: 200px;
    outline: none;
    transition: border-color 0.15s, width 0.2s;
  }
  .prod-search-input:focus { border-color: var(--accent); width: 240px; }
  .prod-search-input::placeholder { color: var(--text3); }
  .prod-search-clear {
    position: absolute;
    right: 8px;
    background: none;
    border: none;
    color: var(--text3);
    cursor: pointer;
    font-size: 14px;
    line-height: 1;
    padding: 0;
    display: none;
  }
  .prod-search-clear:hover { color: var(--text2); }
  .prod-dropdown {
    position: absolute;
    top: calc(100% + 4px);
    left: 0;
    width: 320px;
    background: var(--surface);
    border: 0.5px solid var(--border2);
    border-radius: var(--radius);
    box-shadow: 0 4px 16px rgba(0,0,0,0.12);
    z-index: 999;
    max-height: 240px;
    overflow-y: auto;
    display: none;
  }
  .prod-dropdown.open { display: block; }
  .prod-option {
    padding: 8px 12px;
    font-size: 13px;
    color: var(--text);
    cursor: pointer;
    border-bottom: 0.5px solid var(--border);
    transition: background 0.1s;
  }
  .prod-option:last-child { border-bottom: none; }
  .prod-option:hover, .prod-option.active { background: var(--surface2); }
  .prod-option mark {
    background: transparent;
    color: var(--accent);
    font-weight: 600;
  }
  .prod-option .prod-opt-qty {
    float: right;
    font-size: 11px;
    color: var(--text3);
  }
  .prod-empty {
    padding: 12px;
    font-size: 12px;
    color: var(--text3);
    text-align: center;
  }

  /* ── 품목 상세 카드 ── */
  .prod-detail-card {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-left: 3px solid var(--accent);
    border-radius: var(--radius-lg);
    padding: 18px 20px;
    box-shadow: var(--shadow);
    margin-bottom: 14px;
    display: none;
  }
  .prod-detail-card.visible { display: block; }
  .prod-detail-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
    flex-wrap: wrap;
    gap: 8px;
  }
  .prod-detail-name {
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
  }
  .prod-detail-meta {
    font-size: 12px;
    color: var(--text3);
    margin-top: 2px;
  }
  .prod-detail-close {
    background: none;
    border: 0.5px solid var(--border2);
    border-radius: var(--radius);
    padding: 4px 10px;
    font-size: 12px;
    color: var(--text2);
    cursor: pointer;
  }
  .prod-detail-close:hover { background: var(--surface2); }
  .prod-kpi-row {
    display: flex;
    gap: 12px;
    margin-bottom: 16px;
    flex-wrap: wrap;
  }
  .prod-kpi {
    background: var(--surface2);
    border-radius: var(--radius);
    padding: 10px 14px;
    min-width: 110px;
  }
  .prod-kpi .lbl { font-size: 11px; color: var(--text3); }
  .prod-kpi .val { font-size: 20px; font-weight: 700; color: var(--text); letter-spacing: -0.5px; }
  .prod-charts-row {
    display: grid;
    grid-template-columns: 1.4fr 1fr;
    gap: 14px;
  }
  @media (max-width: 720px) { .prod-charts-row { grid-template-columns: 1fr; } }

  /* ── 로딩 스켈레톤 ── */
  .skeleton {
    background: linear-gradient(90deg, var(--surface2) 25%, var(--border) 50%, var(--surface2) 75%);
    background-size: 200% 100%;
    animation: shimmer 1.5s infinite;
    border-radius: 6px;
  }
  @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

  /* ── 반응형 ── */
  @media (max-width: 720px) {
    .charts-row.two { grid-template-columns: 1fr; }
    .header { flex-direction: column; align-items: flex-start; }
    .gas-input input { width: 180px; }
  }

  /* ── 푸터 ── */
  .footer {
    text-align: center;
    font-size: 11px;
    color: var(--text3);
    padding-top: 30px;
    border-top: 0.5px solid var(--border);
    margin-top: 20px;
  }
</style>
</head>
<body>
<div class="page">

  <!-- 헤더 -->
  <div class="header">
    <div class="header-left">
      <h1>창고별 출고수량 대시보드</h1>
      <p>일로사케 &amp; 일로플러스 · 구글 시트 연동</p>
    </div>
    <div class="header-right">
      <div class="gas-input">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="flex-shrink:0;color:var(--text3)"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
        <input type="text" id="gasUrl" placeholder="Google Apps Script 웹 앱 URL 붙여넣기" />
      </div>
      <button class="btn primary" onclick="loadFromGAS()">연결</button>
      <button class="btn" onclick="saveUrl()">URL 저장</button>
      <button class="theme-toggle" id="themeToggle" onclick="toggleTheme()" title="테마 전환">
        <span id="themeIcon">🌙</span>
        <div class="toggle-track"><div class="toggle-thumb"></div></div>
        <span id="themeLabel">다크</span>
      </button>
    </div>
  </div>

  <!-- 상태 배너 -->
  <div class="status-bar info" id="statusBar">
    <span class="dot blue"></span>
    <span id="statusText">Google Apps Script URL을 입력하고 '연결'을 눌러 시트 데이터를 불러오세요.</span>
  </div>

  <!-- 필터 바 -->
  <div class="filter-bar">
    <label>구분</label>
    <div class="ms-wrap" id="msGubWrap">
      <div class="ms-trigger" id="msGubTrigger" onclick="toggleMs('Gub')">
        <span class="ms-label" id="msGubLabel">전체</span>
        <span class="ms-arrow">▾</span>
      </div>
      <div class="ms-panel" id="msGubPanel">
        <div class="ms-option ms-all" onclick="msSelectAll('Gub')">
          <input type="checkbox" id="msGubAll" checked> 전체
        </div>
      </div>
    </div>

    <label>창고</label>
    <div class="ms-wrap" id="msWhWrap">
      <div class="ms-trigger" id="msWhTrigger" onclick="toggleMs('Wh')">
        <span class="ms-label" id="msWhLabel">전체</span>
        <span class="ms-arrow">▾</span>
      </div>
      <div class="ms-panel" id="msWhPanel">
        <div class="ms-option ms-all" onclick="msSelectAll('Wh')">
          <input type="checkbox" id="msWhAll" checked> 전체
        </div>
      </div>
    </div>

    <label>기간</label>
    <div class="mon-range-wrap" id="monRangeWrap">
      <div class="mon-range-trigger" id="monRangeTrigger" onclick="toggleMonPanel()">
        <span id="monRangeLabel">전체 기간</span>
        <span class="ms-arrow">▾</span>
      </div>
      <div class="mon-range-panel" id="monRangePanel">
        <div class="mon-range-labels">
          <span id="monFromLabel">–</span>
          <span style="color:var(--text3)">→</span>
          <span id="monToLabel">–</span>
        </div>
        <div class="mon-slider-row">
          <div class="mon-slider-track"></div>
          <div class="mon-slider-fill" id="monSliderFill"></div>
          <input type="range" id="monSliderFrom" min="0" max="5" value="0" step="1" oninput="onMonSlider()">
          <input type="range" id="monSliderTo"   min="0" max="5" value="5" step="1" oninput="onMonSlider()">
        </div>
        <div class="mon-month-list" id="monMonthList"></div>
        <div class="mon-quick-btns" id="monQuickBtns"></div>
      </div>
    </div>

    <div class="filter-divider"></div>
    <label>품목</label>
    <div class="prod-search-wrap" id="prodSearchWrap">
      <input type="text" class="prod-search-input" id="prodSearch"
        placeholder="품목명 검색..."
        autocomplete="off"
        oninput="onProdInput()"
        onkeydown="onProdKeydown(event)"
        onfocus="onProdFocus()" />
      <button class="prod-search-clear" id="prodClear" onclick="clearProd()" title="검색 초기화">✕</button>
      <div class="prod-dropdown" id="prodDropdown"></div>
    </div>
    <div class="filter-divider"></div>
    <button class="filter-reset" onclick="resetFilters()">전체 초기화</button>
    <span id="filterSummary" style="font-size:12px;color:var(--text3);margin-left:4px"></span>
  </div>

  <!-- KPI -->
  <div class="kpi-grid" id="kpiGrid">
    <div class="kpi-card accent skeleton" style="height:90px"></div>
    <div class="kpi-card skeleton" style="height:90px"></div>
    <div class="kpi-card skeleton" style="height:90px"></div>
    <div class="kpi-card skeleton" style="height:90px"></div>
    <div class="kpi-card skeleton" style="height:90px"></div>
  </div>

  <!-- 차트 Row 1 -->
  <div class="charts-row two">
    <div class="chart-card">
      <div class="chart-header"><span class="chart-title">월별 출고수량 추이</span></div>
      <div class="legend" id="leg1"></div>
      <div class="chart-wrap" style="height:380px"><canvas id="c1" role="img" aria-label="월별 출고수량 추이"></canvas></div>
    </div>
    <div class="chart-card">
      <div class="chart-header"><span class="chart-title">창고별 비중</span></div>
      <div class="chart-wrap" style="height:380px"><canvas id="c2" role="img" aria-label="창고별 비중 도넛"></canvas></div>
    </div>
  </div>

  <!-- 차트 Row 2 -->
  <div class="charts-row two">
    <div class="chart-card">
      <div class="chart-header"><span class="chart-title">창고별 월별 수량 (누적)</span></div>
      <div class="chart-wrap" style="height:400px"><canvas id="c3" role="img" aria-label="창고별 월별 수량"></canvas></div>
    </div>
    <div class="chart-card">
      <div class="chart-header"><span class="chart-title">구분별 월별 수량</span></div>
      <div class="legend" id="leg4"></div>
      <div class="chart-wrap" style="height:380px"><canvas id="c4" role="img" aria-label="구분별 월별 수량"></canvas></div>
    </div>
  </div>

  <!-- 품목 상세 -->
  <div class="prod-detail-card" id="prodDetailCard">
    <div class="prod-detail-header">
      <div>
        <div class="prod-detail-name" id="pdName">–</div>
        <div class="prod-detail-meta" id="pdMeta">–</div>
      </div>
      <button class="prod-detail-close" onclick="clearProd()">✕ 품목 닫기</button>
    </div>
    <div class="prod-kpi-row" id="pdKpis"></div>
    <div class="prod-charts-row">
      <div>
        <div style="font-size:12px;font-weight:600;color:var(--text2);margin-bottom:8px">월별 출고수량</div>
        <div style="position:relative;height:380px"><canvas id="pdC1" role="img" aria-label="품목 월별 출고수량"></canvas></div>
      </div>
      <div>
        <div style="font-size:12px;font-weight:600;color:var(--text2);margin-bottom:8px">창고별 비중</div>
        <div style="position:relative;height:380px"><canvas id="pdC2" role="img" aria-label="품목 창고별 비중"></canvas></div>
      </div>
    </div>
  </div>

  <!-- 상위 품목 -->
  <div class="top-card">
    <div class="chart-header" style="margin-bottom:14px">
      <span class="chart-title">상위 품목 출고수량</span>
      <span style="font-size:11px;color:var(--text3)" id="topNote"></span>
    </div>
    <ul class="top-list" id="topList">
      <li style="text-align:center;padding:30px;color:var(--text3);font-size:13px">데이터를 불러오는 중...</li>
    </ul>
  </div>

  <!-- 마지막 업데이트 -->
  <div class="footer">
    <span id="lastUpdated">–</span> &nbsp;·&nbsp; 일로사케 창고별 출고수량 대시보드
  </div>

</div><!-- /page -->

<script>
// ══════════════════════════════════════════
//  설정
// ══════════════════════════════════════════
const WH_COLORS = {
  '본사창고': '#00C49A',  // 민트 그린
  '부산창고': '#FF6B6B',  // 코랄 레드
  '물류창고': '#4ECDC4',  // 터쿼이즈
  '지방배송': '#FFB347',  // 피치 오렌지
  '택배':     '#A78BFA',  // 라벤더 퍼플
};
const GUB_COLORS = { '일로사케': '#06B6D4', '일로플러스': '#F43F5E' };

// ══════════════════════════════════════════
//  상태
// ══════════════════════════════════════════
let RAW = null;
let charts = {};
let selectedProd = null;   // 현재 선택된 품목명
let dropdownIdx  = -1;     // 키보드 탐색 인덱스

// ══════════════════════════════════════════
//  초기화
// ══════════════════════════════════════════
// ══════════════════════════════════════════
//  테마 토글
// ══════════════════════════════════════════
function toggleTheme() {
  const root = document.documentElement;
  const cur  = root.getAttribute('data-theme');
  // 현재 시스템 다크 여부
  const sysDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
  let next;
  if (!cur) {
    // 시스템 기본값에서 반대로
    next = sysDark ? 'light' : 'dark';
  } else {
    next = cur === 'dark' ? 'light' : 'dark';
  }
  root.setAttribute('data-theme', next);
  localStorage.setItem('theme', next);
  updateThemeBtn(next);
}

function updateThemeBtn(theme) {
  const btn   = document.getElementById('themeToggle');
  const icon  = document.getElementById('themeIcon');
  const label = document.getElementById('themeLabel');
  if (!btn) return;
  if (theme === 'dark') {
    btn.classList.add('dark');
    icon.textContent  = '🌙';
    label.textContent = '다크';
  } else {
    btn.classList.remove('dark');
    icon.textContent  = '☀️';
    label.textContent = '라이트';
  }
}

function initTheme() {
  const saved   = localStorage.getItem('theme');
  const sysDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
  const theme   = saved || (sysDark ? 'dark' : 'light');
  document.documentElement.setAttribute('data-theme', theme);
  updateThemeBtn(theme);
}
initTheme();

// ChartDataLabels 전역 등록
Chart.register(ChartDataLabels);
// 기본적으로 모든 차트에서 datalabels 비활성화 (각 차트에서 명시적으로 켬)
Chart.defaults.set('plugins.datalabels', { display: false });

window.addEventListener('DOMContentLoaded', () => {
  const saved = localStorage.getItem('gasUrl');
  if (saved) {
    document.getElementById('gasUrl').value = saved;
    loadFromGAS();
  }
});

function saveUrl() {
  const url = document.getElementById('gasUrl').value.trim();
  if (url) {
    localStorage.setItem('gasUrl', url);
    showStatus('success', 'URL이 브라우저에 저장되었습니다. 다음 방문 시 자동 연결됩니다.');
  }
}

// ══════════════════════════════════════════
//  Google Apps Script 연결
// ══════════════════════════════════════════
async function loadFromGAS() {
  const url = document.getElementById('gasUrl').value.trim();
  if (!url) {
    showStatus('error', 'Google Apps Script URL을 입력해주세요.');
    return;
  }

  showStatus('loading', '구글 시트에서 데이터를 불러오는 중...');

  try {
    const res = await fetch(url, { redirect: 'follow' });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const json = await res.json();

    if (json.status !== 'ok') throw new Error(json.message || '알 수 없는 오류');

    RAW = json.data;
    populateFilters();
    update();

    const now = new Date().toLocaleString('ko-KR');
    document.getElementById('lastUpdated').textContent = `마지막 업데이트: ${now}`;
    showStatus('success', `데이터 로드 완료 — ${RAW.mwg.length}개 집계 행 · ${RAW.t30.length}개 상위 품목`);

    localStorage.setItem('gasUrl', url);
  } catch (err) {
    showStatus('error', `오류: ${err.message} — URL과 배포 설정(액세스: 모든 사용자)을 확인하세요.`);
  }
}

// ══════════════════════════════════════════
//  멀티셀렉트 상태
// ══════════════════════════════════════════
const msState = { Gub: new Set(), Wh: new Set() };
let monRange = { from: 0, to: 0 }; // 인덱스 기준

// ══════════════════════════════════════════
//  필터 초기화
// ══════════════════════════════════════════
function populateFilters() {
  if (!RAW) return;
  buildMs('Gub', RAW.gubuns || []);
  buildMs('Wh',  RAW.warehouses || []);
  buildMonSlider(RAW.months || []);
}

function buildMs(key, items) {
  // 전체 선택 상태로 초기화
  msState[key] = new Set(items);
  const panel = document.getElementById(`ms${key}Panel`);
  // 전체 체크박스 이후 항목들 제거 후 재생성
  const allOpt = panel.querySelector('.ms-all');
  panel.innerHTML = '';
  panel.appendChild(allOpt);
  items.forEach(v => {
    const div = document.createElement('div');
    div.className = 'ms-option';
    div.innerHTML = `<input type="checkbox" value="${v}" checked onchange="onMsChange('${key}')"> ${v}`;
    panel.appendChild(div);
  });
  updateMsTrigger(key, items);
}

function toggleMs(key) {
  const panel = document.getElementById(`ms${key}Panel`);
  const trigger = document.getElementById(`ms${key}Trigger`);
  const isOpen = panel.classList.contains('open');
  // 다른 패널 닫기
  document.querySelectorAll('.ms-panel.open, .mon-range-panel.open').forEach(el => el.classList.remove('open'));
  document.querySelectorAll('.ms-trigger.open, .mon-range-trigger.open').forEach(el => el.classList.remove('open'));
  if (!isOpen) {
    panel.classList.add('open');
    trigger.classList.add('open');
  }
}

function msSelectAll(key) {
  const panel = document.getElementById(`ms${key}Panel`);
  const checkboxes = panel.querySelectorAll('input[type="checkbox"]');
  const allItems = Array.from(panel.querySelectorAll('.ms-option:not(.ms-all) input')).map(c => c.value);
  const allChecked = allItems.every(v => msState[key].has(v));
  if (allChecked) {
    // 전체 해제 → 전체 선택으로 순환
    msState[key] = new Set(allItems);
  } else {
    msState[key] = new Set(allItems);
  }
  checkboxes.forEach(c => { c.checked = true; });
  updateMsTrigger(key, allItems);
  update();
}

function onMsChange(key) {
  const panel = document.getElementById(`ms${key}Panel`);
  const checkboxes = panel.querySelectorAll('.ms-option:not(.ms-all) input');
  const allItems = Array.from(checkboxes).map(c => c.value);
  msState[key] = new Set(Array.from(checkboxes).filter(c => c.checked).map(c => c.value));
  // 전부 해제시 전부 선택으로
  if (msState[key].size === 0) {
    msState[key] = new Set(allItems);
    checkboxes.forEach(c => { c.checked = true; });
  }
  const allCb = panel.querySelector('.ms-all input');
  allCb.checked = msState[key].size === allItems.length;
  updateMsTrigger(key, allItems);
  update();
}

function updateMsTrigger(key, allItems) {
  const sel = msState[key];
  const label = document.getElementById(`ms${key}Label`);
  const trigger = document.getElementById(`ms${key}Trigger`);
  // 기존 badge 제거
  const oldBadge = trigger.querySelector('.ms-badge');
  if (oldBadge) oldBadge.remove();
  if (sel.size === 0 || sel.size === allItems.length) {
    label.textContent = '전체';
    trigger.classList.remove('active');
  } else {
    label.textContent = [...sel].join(', ').slice(0, 14) + (([...sel].join(', ').length > 14) ? '…' : '');
    trigger.classList.add('active');
    const badge = document.createElement('span');
    badge.className = 'ms-badge';
    badge.textContent = sel.size;
    trigger.appendChild(badge);
  }
}

// ── 월 범위 슬라이더 ──
function buildMonSlider(months) {
  const n = months.length;
  monRange = { from: 0, to: n - 1 };
  const slFrom = document.getElementById('monSliderFrom');
  const slTo   = document.getElementById('monSliderTo');
  slFrom.max = n - 1; slFrom.value = 0;
  slTo.max   = n - 1; slTo.value   = n - 1;

  // 월 라벨 생성
  const list = document.getElementById('monMonthList');
  list.innerHTML = months.map((m, i) =>
    `<span class="mon-month-tick in-range" data-i="${i}">${m.slice(5)}월</span>`
  ).join('');

  // 퀵버튼 생성
  const qb = document.getElementById('monQuickBtns');
  qb.innerHTML = `
    <span class="mon-quick-btn" onclick="setMonRange(0,${n-1})">전체</span>
    <span class="mon-quick-btn" onclick="setMonRange(0,2)">1~3월</span>
    <span class="mon-quick-btn" onclick="setMonRange(3,5)">4~6월</span>
    <span class="mon-quick-btn" onclick="setMonRange(${n-3},${n-1})">최근 3개월</span>
  `;
  updateMonUI(months);
}

function toggleMonPanel() {
  const panel = document.getElementById('monRangePanel');
  const trigger = document.getElementById('monRangeTrigger');
  const isOpen = panel.classList.contains('open');
  document.querySelectorAll('.ms-panel.open, .mon-range-panel.open').forEach(el => el.classList.remove('open'));
  document.querySelectorAll('.ms-trigger.open, .mon-range-trigger.open').forEach(el => el.classList.remove('open'));
  if (!isOpen) { panel.classList.add('open'); trigger.classList.add('open'); }
}

function onMonSlider() {
  const months = RAW.months || [];
  let from = parseInt(document.getElementById('monSliderFrom').value);
  let to   = parseInt(document.getElementById('monSliderTo').value);
  if (from > to) { [from, to] = [to, from]; }
  monRange = { from, to };
  updateMonUI(months);
  update();
}

function setMonRange(from, to) {
  const months = RAW.months || [];
  monRange = { from, to };
  document.getElementById('monSliderFrom').value = from;
  document.getElementById('monSliderTo').value   = to;
  updateMonUI(months);
  update();
}

function updateMonUI(months) {
  const { from, to } = monRange;
  const n = months.length;
  // 슬라이더 fill
  const fill = document.getElementById('monSliderFill');
  fill.style.left  = `${(from / (n-1)) * 100}%`;
  fill.style.right = `${((n-1-to) / (n-1)) * 100}%`;
  // 라벨
  document.getElementById('monFromLabel').textContent = months[from] ? months[from].replace('/', '년 ') + '월' : '';
  document.getElementById('monToLabel').textContent   = months[to]   ? months[to].replace('/', '년 ')   + '월' : '';
  // 트리거 라벨
  const trigger = document.getElementById('monRangeTrigger');
  const isAll = from === 0 && to === n - 1;
  document.getElementById('monRangeLabel').textContent = isAll
    ? '전체 기간'
    : `${months[from].slice(5)}월 ~ ${months[to].slice(5)}월`;
  trigger.classList.toggle('active', !isAll);
  // 틱 색상
  document.querySelectorAll('#monMonthList .mon-month-tick').forEach((el, i) => {
    el.classList.toggle('in-range', i >= from && i <= to);
  });
}

function resetFilters() {
  const months = RAW ? (RAW.months || []) : [];
  // 멀티셀렉트 전체 선택
  ['Gub','Wh'].forEach(key => {
    const panel = document.getElementById(`ms${key}Panel`);
    if (!panel) return;
    panel.querySelectorAll('input[type="checkbox"]').forEach(c => { c.checked = true; });
    const allItems = Array.from(panel.querySelectorAll('.ms-option:not(.ms-all) input')).map(c => c.value);
    msState[key] = new Set(allItems);
    updateMsTrigger(key, allItems);
  });
  // 월 범위 전체
  if (months.length) setMonRange(0, months.length - 1);
  clearProd();
  update();
}

function getFilters() {
  const months = RAW ? (RAW.months || []) : [];
  const selMonths = months.slice(monRange.from, monRange.to + 1);
  return {
    gubs: msState.Gub,
    whs:  msState.Wh,
    mons: new Set(selMonths),
    prod: selectedProd,
  };
}

// ══════════════════════════════════════════
//  필터 적용 헬퍼
// ══════════════════════════════════════════
function filterMWG(f) {
  const allGubs = RAW.gubuns || [];
  const allWhs  = RAW.warehouses || [];
  const allMons = RAW.months || [];
  const gAll = f.gubs.size === allGubs.length;
  const wAll = f.whs.size  === allWhs.length;
  const mAll = f.mons.size === allMons.length;
  return (RAW.mwg || []).filter(r =>
    (gAll || f.gubs.has(r[2])) &&
    (wAll || f.whs.has(r[1]))  &&
    (mAll || f.mons.has(r[0]))
  );
}
function filterMG(f) {
  const allGubs = RAW.gubuns || [];
  const allMons = RAW.months || [];
  const gAll = f.gubs.size === allGubs.length;
  const mAll = f.mons.size === allMons.length;
  return (RAW.mg || []).filter(r =>
    (gAll || f.gubs.has(r[1])) &&
    (mAll || f.mons.has(r[0]))
  );
}
function filterPWM(f) {
  const allWhs  = RAW.warehouses || [];
  const allMons = RAW.months || [];
  const wAll = f.whs.size  === allWhs.length;
  const mAll = f.mons.size === allMons.length;
  return (RAW.pwm || []).filter(r =>
    (wAll || f.whs.has(r[1]))  &&
    (mAll || f.mons.has(r[2])) &&
    (!f.prod || r[0] === f.prod)
  );
}

// ══════════════════════════════════════════
//  품목 검색
// ══════════════════════════════════════════
function getProdTotals() {
  // 전체 품목 → 수량 합계 (t30 + pwm에서 수집)
  const map = {};
  (RAW.t30 || []).forEach(([n, q]) => { map[n] = (map[n] || 0) + q; });
  (RAW.pwm || []).forEach(([n,,,q]) => { map[n] = (map[n] || 0) + q; });
  return map;
}

function onProdInput() {
  const q = document.getElementById('prodSearch').value.trim();
  document.getElementById('prodClear').style.display = q ? 'block' : 'none';
  dropdownIdx = -1;
  if (!RAW) return;
  if (!q) { closeDropdown(); return; }
  renderDropdown(q);
}

function onProdFocus() {
  const q = document.getElementById('prodSearch').value.trim();
  if (q && RAW) renderDropdown(q);
}

function onProdKeydown(e) {
  const dd = document.getElementById('prodDropdown');
  const items = dd.querySelectorAll('.prod-option');
  if (e.key === 'ArrowDown') {
    e.preventDefault();
    dropdownIdx = Math.min(dropdownIdx + 1, items.length - 1);
    items.forEach((el, i) => el.classList.toggle('active', i === dropdownIdx));
  } else if (e.key === 'ArrowUp') {
    e.preventDefault();
    dropdownIdx = Math.max(dropdownIdx - 1, 0);
    items.forEach((el, i) => el.classList.toggle('active', i === dropdownIdx));
  } else if (e.key === 'Enter') {
    e.preventDefault();
    if (dropdownIdx >= 0 && items[dropdownIdx]) items[dropdownIdx].click();
    else if (items.length === 1) items[0].click();
  } else if (e.key === 'Escape') {
    closeDropdown();
  }
}

function renderDropdown(query) {
  if (!RAW) return;
  const q = query.toLowerCase();
  const totals = getProdTotals();
  // 전체 품목 풀 (t30 + pwm 합집합)
  const allProds = [...new Set([...(RAW.t30 || []).map(r=>r[0]), ...(RAW.pwm || []).map(r=>r[0])])];
  const matched = allProds
    .filter(n => n.toLowerCase().includes(q))
    .sort((a, b) => (totals[b] || 0) - (totals[a] || 0))
    .slice(0, 20);

  const dd = document.getElementById('prodDropdown');
  if (matched.length === 0) {
    dd.innerHTML = `<div class="prod-empty">검색 결과 없음 — "${query}"</div>`;
  } else {
    const re = new RegExp(`(${query.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`, 'gi');
    dd.innerHTML = matched.map(n => {
      const highlighted = n.replace(re, '<mark>$1</mark>');
      const qty = (totals[n] || 0).toLocaleString();
      return `<div class="prod-option" onclick="selectProd('${n.replace(/'/g,"\\'")}')">
        ${highlighted}<span class="prod-opt-qty">${qty}병</span>
      </div>`;
    }).join('');
  }
  dd.classList.add('open');
}

function closeDropdown() {
  document.getElementById('prodDropdown').classList.remove('open');
  dropdownIdx = -1;
}

function selectProd(name) {
  selectedProd = name;
  document.getElementById('prodSearch').value = name;
  document.getElementById('prodClear').style.display = 'block';
  closeDropdown();
  update();
}

function clearProd() {
  selectedProd = null;
  document.getElementById('prodSearch').value = '';
  document.getElementById('prodClear').style.display = 'none';
  closeDropdown();
  document.getElementById('prodDetailCard').classList.remove('visible');
  destroyChart('pdC1');
  destroyChart('pdC2');
  update();
}

// 외부 클릭 시 드롭다운 닫기
document.addEventListener('click', e => {
  if (!document.getElementById('prodSearchWrap').contains(e.target)) closeDropdown();
  if (!document.getElementById('msGubWrap')?.contains(e.target)) {
    document.getElementById('msGubPanel')?.classList.remove('open');
    document.getElementById('msGubTrigger')?.classList.remove('open');
  }
  if (!document.getElementById('msWhWrap')?.contains(e.target)) {
    document.getElementById('msWhPanel')?.classList.remove('open');
    document.getElementById('msWhTrigger')?.classList.remove('open');
  }
  if (!document.getElementById('monRangeWrap')?.contains(e.target)) {
    document.getElementById('monRangePanel')?.classList.remove('open');
    document.getElementById('monRangeTrigger')?.classList.remove('open');
  }
});

// ══════════════════════════════════════════
//  메인 업데이트
// ══════════════════════════════════════════
function update() {
  if (!RAW) return;
  const f = getFilters();

  // 필터 요약
  const parts = [];
  const allGubs = RAW.gubuns || [];
  const allWhs  = RAW.warehouses || [];
  if (f.gubs.size < allGubs.length) parts.push([...f.gubs].join('+'));
  if (f.whs.size  < allWhs.length)  parts.push([...f.whs].join('+'));
  const allMons = RAW.months || [];
  if (f.mons.size < allMons.length) {
    const sorted = [...f.mons].sort();
    parts.push(sorted[0].slice(5) + '월~' + sorted[sorted.length-1].slice(5) + '월');
  }
  if (f.prod) parts.push(`"${f.prod}"`);
  document.getElementById('filterSummary').textContent = parts.length ? `(${parts.join(' · ')})` : '';

  renderKPIs(f);
  renderC1(f);
  renderC2(f);
  renderC3(f);
  renderC4(f);
  renderTop(f);
  if (f.prod) renderProdDetail(f);
}

// ══════════════════════════════════════════
//  KPI
// ══════════════════════════════════════════
function renderKPIs(f) {
  const rows = filterMWG(f);
  const totalQ = rows.reduce((s, r) => s + r[3], 0);
  const totalT = rows.reduce((s, r) => s + r[4], 0);
  const monthCnt = new Set(rows.map(r => r[0])).size;
  const whCnt    = new Set(rows.map(r => r[1])).size;
  const avgMon   = monthCnt > 0 ? Math.round(totalQ / monthCnt) : 0;
  const selMons  = [...f.mons].sort();
  const monSubLabel = selMons.length === (RAW.months||[]).length
    ? (RAW.months||[]).slice(0,3).map(m=>m.slice(5)+'월').join(', ') + '…'
    : selMons.map(m=>m.slice(5)+'월').join(', ');
  const whSubLabel = f.whs.size === (RAW.warehouses||[]).length
    ? (RAW.warehouses||[]).join(' · ')
    : [...f.whs].join(' · ');

  document.getElementById('kpiGrid').innerHTML = `
    <div class="kpi-card accent">
      <div class="kpi-label">총 출고수량</div>
      <div class="kpi-value">${totalQ.toLocaleString()}<span class="kpi-unit">병</span></div>
      <div class="kpi-sub">월평균 ${avgMon.toLocaleString()}병</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label">총 공급금액</div>
      <div class="kpi-value">${(totalT / 1e8).toFixed(1)}<span class="kpi-unit">억</span></div>
      <div class="kpi-sub">${(totalT / 1e6).toFixed(0)}백만원</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label">집계 월 수</div>
      <div class="kpi-value">${monthCnt}<span class="kpi-unit">개월</span></div>
      <div class="kpi-sub">${monSubLabel}</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label">활성 창고</div>
      <div class="kpi-value">${whCnt}<span class="kpi-unit">개</span></div>
      <div class="kpi-sub">${whSubLabel}</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label">품목 수 (상위)</div>
      <div class="kpi-value">${(RAW.t30 || []).length}<span class="kpi-unit">종</span></div>
      <div class="kpi-sub">전체 취급 품목 기준</div>
    </div>
  `;
}

// ══════════════════════════════════════════
//  차트 헬퍼
// ══════════════════════════════════════════
function destroyChart(id) {
  if (charts[id]) { charts[id].destroy(); delete charts[id]; }
}

function fmtK(v) { return v >= 1000 ? Math.round(v / 1000) + 'K' : String(v); }

// ══════════════════════════════════════════
//  C1: 월별 추이 (라인)
// ══════════════════════════════════════════
function renderC1(f) {
  destroyChart('c1');
  const months = [...f.mons].sort();
  const whs    = [...f.whs];
  const rows   = filterMWG(f);

  const datasets = whs.map(wh => ({
    label: wh,
    data: months.map(m => rows.filter(r => r[0] === m && r[1] === wh).reduce((s, r) => s + r[3], 0)),
    borderColor: WH_COLORS[wh] || '#888',
    backgroundColor: (WH_COLORS[wh] || '#888') + '22',
    borderWidth: 2,
    pointRadius: 4,
    pointHoverRadius: 6,
    tension: 0.3,
    fill: false,
    borderDash: wh === '택배' ? [5,3] : wh === '지방배송' ? [2,2] : [],
  }));

  const leg = document.getElementById('leg1');
  leg.innerHTML = whs.map(wh =>
    `<div class="legend-item"><div class="legend-dot" style="background:${WH_COLORS[wh]||'#888'}"></div>${wh}</div>`
  ).join('');

  charts['c1'] = new Chart(document.getElementById('c1'), {
    type: 'line',
    data: { labels: months.map(m => m.slice(5) + '월'), datasets },
    options: {
      responsive: true, maintainAspectRatio: false,
      layout: { padding: { top: 20 } },
      plugins: {
        legend: { display: false },
        datalabels: {
          display: ctx => !ctx.dataset.borderDash,
          align: 'top',
          anchor: 'end',
          offset: 2,
          font: { size: 10, weight: '600' },
          color: ctx => ctx.dataset.borderColor || '#888',
          formatter: v => v > 0 ? fmtK(v) : null,
        },
      },
      scales: { y: { ticks: { callback: fmtK } } },
    },
  });
}

// ══════════════════════════════════════════
//  C2: 창고별 비중 (도넛)
// ══════════════════════════════════════════
function renderC2(f) {
  destroyChart('c2');
  const whs  = [...f.whs];
  const rows = filterMWG(f);
  const data = whs.map(wh => rows.filter(r => r[1] === wh).reduce((s, r) => s + r[3], 0));

  const total2 = data.reduce((s, v) => s + v, 0);
  charts['c2'] = new Chart(document.getElementById('c2'), {
    type: 'doughnut',
    data: {
      labels: whs,
      datasets: [{
        data,
        backgroundColor: whs.map(w => WH_COLORS[w] || '#888'),
        borderWidth: 2,
        borderColor: '#fff',
      }],
    },
    options: {
      responsive: true, maintainAspectRatio: false, cutout: '60%',
      layout: { padding: 50 },
      plugins: {
        legend: { position: 'right', labels: { font: { size: 12 }, boxWidth: 12, padding: 14 } },
        tooltip: { callbacks: { label: ctx => `${ctx.label}: ${ctx.parsed.toLocaleString()}병` } },
        datalabels: {
          display: true,
          anchor: 'end',
          align: 'end',
          offset: 6,
          color: ctx => {
            const colors = ['#00C49A','#FF6B6B','#4ECDC4','#FFB347','#A78BFA'];
            return colors[ctx.dataIndex % colors.length];
          },
          font: { size: 11, weight: '700' },
          textStrokeColor: 'rgba(0,0,0,0.8)',
          textStrokeWidth: 3,
          textShadowBlur: 4,
          textShadowColor: 'rgba(0,0,0,0.9)',
          formatter: (v) => {
            if (!v || total2 === 0) return null;
            const pct = (v / total2 * 100).toFixed(1);
            return [`${v.toLocaleString()}병`, `(${pct}%)`];
          },
          textAlign: 'center',
        },
      },
    },
  });
}

// ══════════════════════════════════════════
//  상위 품목 랭킹
// ══════════════════════════════════════════
function renderTop(f) {
  const pwmRows = filterPWM(f);
  let byProd = {};

  if (pwmRows.length > 0) {
    pwmRows.forEach(([prod, wh, mon, q]) => { byProd[prod] = (byProd[prod] || 0) + q; });
  } else {
    // pwm에 없는 경우 t30 fallback
    (RAW.t30 || []).forEach(([name, q]) => { byProd[name] = q; });
  }

  const sorted = Object.entries(byProd).sort((a, b) => b[1] - a[1]).slice(0, 15);
  const maxQ   = sorted[0]?.[1] || 1;

  const allWhs = RAW.warehouses || [];
  const allMons = RAW.months || [];
  const isFiltered = f.whs.size < allWhs.length || f.mons.size < allMons.length;
  const noteWh  = f.whs.size < allWhs.length  ? [...f.whs].join('+') : '';
  const noteMon = f.mons.size < allMons.length ? [...f.mons].sort().map(m=>m.slice(5)+'월').join('~') : '';
  document.getElementById('topNote').textContent = isFiltered
    ? `(${[noteWh, noteMon].filter(Boolean).join(' · ')} 기준)`
    : '(전체 기준)';

  if (sorted.length === 0) {
    document.getElementById('topList').innerHTML =
      '<li style="text-align:center;padding:24px;color:var(--text3);font-size:13px">해당 조건의 품목 데이터가 없습니다.</li>';
    return;
  }

  document.getElementById('topList').innerHTML = sorted.map(([name, q], i) => `
    <li class="top-item">
      <span class="top-rank">${i + 1}</span>
      <span class="top-name" title="${name}">${name}</span>
      <div class="top-bar-bg"><div class="top-bar-fill" style="width:${Math.round(q / maxQ * 100)}%"></div></div>
      <span class="top-qty">${q.toLocaleString()}</span>
    </li>
  `).join('');
}

// ══════════════════════════════════════════
//  품목 상세 카드
// ══════════════════════════════════════════
function renderProdDetail(f) {
  const card = document.getElementById('prodDetailCard');
  card.classList.add('visible');

  // 이 품목의 pwm rows (창고 x 월)
  const allWhs2 = RAW.warehouses || [];
  const allMons2 = RAW.months || [];
  const rows = (RAW.pwm || []).filter(r => r[0] === f.prod &&
    (f.whs.size === allWhs2.length || f.whs.has(r[1])) &&
    (f.mons.size === allMons2.length || f.mons.has(r[2]))
  );

  const totalQ = rows.reduce((s, r) => s + r[3], 0);
  const months  = [...new Set(rows.map(r => r[2]))].sort();
  const whs     = [...new Set(rows.map(r => r[1]))];

  // 월별 합산 후 최다/최소/평균 계산
  const qByMonth = {};
  rows.forEach(r => { qByMonth[r[2]] = (qByMonth[r[2]] || 0) + r[3]; });
  const monthEntries = Object.entries(qByMonth).sort((a, b) => a[0].localeCompare(b[0]));
  const peakMonth = [...monthEntries].sort((a, b) => b[1] - a[1])[0];
  const avgQ = monthEntries.length > 0 ? Math.round(monthEntries.reduce((s, e) => s + e[1], 0) / monthEntries.length) : 0;
  const peakLabel = peakMonth
    ? `${peakMonth[0].replace('/', '년 ')}월 (${peakMonth[1].toLocaleString()}병)`
    : '–';

  document.getElementById('pdName').textContent = f.prod;
  document.getElementById('pdMeta').textContent =
    `${months.length}개월 데이터 · ${whs.length}개 창고`;

  document.getElementById('pdKpis').innerHTML = `
    <div class="prod-kpi"><div class="lbl">총 출고수량</div><div class="val">${totalQ.toLocaleString()}<span style="font-size:13px;font-weight:400;color:var(--text2)">병</span></div></div>
    <div class="prod-kpi"><div class="lbl">월평균 출고</div><div class="val">${avgQ.toLocaleString()}<span style="font-size:13px;font-weight:400;color:var(--text2)">병</span></div></div>
    <div class="prod-kpi"><div class="lbl">취급 창고</div><div class="val">${whs.length}<span style="font-size:13px;font-weight:400;color:var(--text2)">개</span></div></div>
    <div class="prod-kpi"><div class="lbl">집계 월 수</div><div class="val">${months.length}<span style="font-size:13px;font-weight:400;color:var(--text2)">개월</span></div></div>
    <div class="prod-kpi" style="min-width:160px"><div class="lbl">최다 출고월</div><div class="val" style="font-size:15px;letter-spacing:-0.3px">${peakLabel}</div></div>
  `;

  // 월별 출고 누적 막대차트
  destroyChart('pdC1');
  const allMonths = [...f.mons].sort();
  const whList = f.whs.size < (RAW.warehouses||[]).length ? [...f.whs] : [...new Set(rows.map(r => r[1]))];
  // 월별 전체 합산 → 평균
  const monthTotals = allMonths.map(m => rows.filter(r => r[2] === m).reduce((s, r) => s + r[3], 0));
  const activeMons  = monthTotals.filter(v => v > 0).length;
  const chartAvg    = activeMons > 0 ? Math.round(monthTotals.reduce((s, v) => s + v, 0) / activeMons) : 0;
  // 창고별 누적 바 데이터셋
  const ds1 = whList.map(wh => ({
    label: wh,
    data: allMonths.map(m => rows.filter(r => r[1] === wh && r[2] === m).reduce((s, r) => s + r[3], 0)),
    backgroundColor: (WH_COLORS[wh] || '#888') + 'cc',
    borderWidth: 0,
    borderRadius: 2,
  }));
  charts['pdC1'] = new Chart(document.getElementById('pdC1'), {
    type: 'bar',
    data: { labels: allMonths.map(m => m.slice(5) + '월'), datasets: ds1 },
    options: {
      responsive: true, maintainAspectRatio: false,
      layout: { padding: { top: 22 } },
      plugins: {
        legend: { position: 'bottom', labels: { font: { size: 11 }, boxWidth: 10, padding: 8,
          filter: item => item.text !== '__avg__' } },
        datalabels: {
          display: true,
          anchor: 'center',
          align: 'center',
          font: { size: 10, weight: '600' },
          color: '#fff',
          formatter: v => v >= 3 ? fmtK(v) : null,
          font: { size: 11, weight: '700' },
        },
        tooltip: {
          callbacks: {
            afterBody: () => [`월평균: ${chartAvg.toLocaleString()}병`],
          },
        },
      },
      scales: {
        x: { stacked: true, ticks: { autoSkip: false } },
        y: {
          stacked: true,
          ticks: { callback: fmtK },
          afterDataLimits: axis => { axis.max = Math.max(axis.max, chartAvg * 1.15); },
        },
      },
    },
    plugins: [{
      id: 'avgLine',
      afterDraw(chart) {
        if (!chartAvg) return;
        const { ctx: c, scales: { x, y } } = chart;
        const yPos = y.getPixelForValue(chartAvg);
        c.save();
        c.beginPath();
        c.moveTo(x.left, yPos);
        c.lineTo(x.right, yPos);
        c.setLineDash([6, 4]);
        c.strokeStyle = '#f59e0b';
        c.lineWidth = 1.5;
        c.stroke();
        c.setLineDash([]);
        c.fillStyle = '#f59e0b';
        c.font = 'bold 10px sans-serif';
        c.textAlign = 'right';
        c.fillText('평균 ' + fmtK(chartAvg), x.right - 4, yPos - 4);
        c.restore();
      },
    }],
  });

  // 창고별 도넛
  destroyChart('pdC2');
  const whTotals = whList.map(wh => rows.filter(r => r[1] === wh).reduce((s, r) => s + r[3], 0));
  const totalPd = whTotals.reduce((s, v) => s + v, 0);
  charts['pdC2'] = new Chart(document.getElementById('pdC2'), {
    type: 'doughnut',
    data: {
      labels: whList,
      datasets: [{ data: whTotals, backgroundColor: whList.map(w => WH_COLORS[w] || '#888'), borderWidth: 2, borderColor: '#fff' }],
    },
    options: {
      responsive: true, maintainAspectRatio: false, cutout: '58%',
      layout: { padding: 50 },
      plugins: {
        legend: { position: 'bottom', labels: { font: { size: 11 }, boxWidth: 10, padding: 8 } },
        tooltip: { callbacks: { label: ctx => `${ctx.label}: ${ctx.parsed.toLocaleString()}병` } },
        datalabels: {
          display: true,
          anchor: 'end',
          align: 'end',
          offset: 6,
          color: ctx => {
            const colors = ['#00C49A','#FF6B6B','#4ECDC4','#FFB347','#A78BFA'];
            return colors[ctx.dataIndex % colors.length];
          },
          font: { size: 11, weight: '700' },
          textStrokeColor: 'rgba(0,0,0,0.8)',
          textStrokeWidth: 3,
          textShadowBlur: 4,
          textShadowColor: 'rgba(0,0,0,0.9)',
          formatter: v => {
            if (!v || totalPd === 0) return null;
            const pct = (v / totalPd * 100).toFixed(1);
            return [`${v.toLocaleString()}병`, `(${pct}%)`];
          },
          textAlign: 'center',
        },
      },
    },
  });
}

// ══════════════════════════════════════════
//  상태 배너
// ══════════════════════════════════════════
function showStatus(type, msg) {
  const bar  = document.getElementById('statusBar');
  const text = document.getElementById('statusText');
  const dotClass = { info:'blue', success:'green', error:'red', loading:'spin' }[type] || 'blue';
  bar.className = `status-bar ${type}`;
  bar.querySelector('.dot').className = `dot ${dotClass}`;
  text.textContent = msg;
}
</script>
