<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>사케 도매 제안서</title>
<!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-1RN8KBM7GE"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', 'G-1RN8KBM7GE');
</script>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Noto+Serif+KR:wght@300;400;600&family=Noto+Sans+KR:wght@300;400;500&family=Shippori+Mincho:wght@400;600&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
:root{
  --ink:#0f1f3d;--ink2:#1e3a6e;--ink3:#4a6fa5;
  --paper:#f0f4fa;--paper2:transparent;--paper3:#c8d8ee;
  --gold:#2563a8;--gold2:#1a4f8a;
  --border:rgba(15,31,61,0.1);--border2:rgba(15,31,61,0.22);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans KR',sans-serif;background:var(--paper);color:var(--ink);min-height:100vh}

/* LOADING */
#loading{position:fixed;inset:0;background:var(--paper);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1rem;z-index:999}
.loading-kanji{font-family:'Shippori Mincho',serif;font-size:3rem;color:var(--border2);letter-spacing:.3em;animation:pulse 1.5s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:.3}50%{opacity:1}}
.loading-txt{font-size:.82rem;color:var(--ink3)}

/* SETUP */
#setup{min-height:100vh;display:none;flex-direction:column;align-items:center;justify-content:center;padding:2rem}
.setup-card{background:#fff;border:1px solid var(--border2);border-radius:16px;padding:2.5rem;max-width:520px;width:100%}
.setup-logo{font-family:'Shippori Mincho',serif;font-size:3rem;color:var(--border2);text-align:center;letter-spacing:.3em;margin-bottom:.5rem}
.setup-title{font-family:'Noto Serif KR',serif;font-size:1.3rem;font-weight:600;text-align:center;color:var(--ink);margin-bottom:.3rem}
.setup-sub{font-size:.78rem;color:var(--ink3);text-align:center;margin-bottom:2rem;font-weight:300}

.section-divider{font-size:.67rem;font-weight:500;color:var(--ink3);letter-spacing:.08em;text-transform:uppercase;display:flex;align-items:center;gap:8px;margin-bottom:.9rem}
.section-divider::before,.section-divider::after{content:'';flex:1;height:1px;background:var(--border2)}

.upload-zone{
  border:1.5px dashed var(--border2);border-radius:10px;
  padding:1.4rem;text-align:center;cursor:pointer;
  transition:border-color .2s,background .2s;margin-bottom:1rem;
  position:relative;
}
.upload-zone:hover,.upload-zone.drag{border-color:var(--gold);background:#fdf8f0}
.upload-zone.done{border-color:var(--gold);border-style:solid;background:#fdf6e8}
.upload-zone input[type=file]{position:absolute;inset:0;width:100%;height:100%;opacity:0;cursor:pointer}
.upload-icon{font-size:1.8rem;margin-bottom:.35rem}
.upload-label{font-size:.84rem;font-weight:500;color:var(--ink);margin-bottom:.2rem}
.upload-hint{font-size:.71rem;color:var(--ink3);line-height:1.5}
.upload-status{font-size:.78rem;color:var(--gold2);font-weight:500;margin-top:.4rem;min-height:1.2em}

.img-saved-row{
  display:flex;align-items:center;justify-content:space-between;
  background:#fdf6e8;border:1px solid var(--gold);border-radius:8px;
  padding:.7rem 1rem;margin-bottom:1rem;font-size:.78rem;
}
.img-saved-row span{color:var(--gold2);font-weight:500}
.img-saved-row button{
  font-size:.7rem;color:var(--ink3);background:transparent;
  border:1px solid var(--border2);border-radius:4px;
  padding:3px 8px;cursor:pointer;font-family:'Noto Sans KR',sans-serif;
}
.img-saved-row button:hover{border-color:var(--ink3)}

.progress-wrap{margin-top:.5rem;display:none}
.progress-bar{height:3px;background:var(--paper3);border-radius:2px;overflow:hidden}
.progress-fill{height:100%;background:var(--gold);border-radius:2px;transition:width .08s}

.btn-start{
  width:100%;padding:12px;border-radius:8px;border:none;
  background:var(--ink);color:var(--paper);
  font-family:'Noto Sans KR',sans-serif;font-size:.95rem;font-weight:500;
  cursor:pointer;transition:background .2s;margin-top:.5rem;
}
.btn-start:hover{background:var(--ink2)}
.btn-start:disabled{background:var(--paper3);color:var(--ink3);cursor:not-allowed}

/* EDITOR */
#editor{min-height:100vh;display:none;flex-direction:column}
.ed-header{background:var(--ink);color:var(--paper);padding:1.5rem 2.5rem;position:relative;overflow:hidden}
.ed-header::before{content:'卸売';position:absolute;right:1.5rem;top:-.5rem;font-family:'Shippori Mincho',serif;font-size:7rem;color:rgba(255,255,255,.04);line-height:1;pointer-events:none;user-select:none}
.ed-header-row{display:flex;align-items:center;justify-content:space-between}
.ed-header h1{font-family:'Noto Serif KR',serif;font-size:1.3rem;font-weight:600;letter-spacing:.05em}
.ed-actions{display:flex;gap:8px;align-items:center}
.ed-meta{font-size:.7rem;color:rgba(247,243,236,.35);margin-right:4px}
.btn-sm{font-size:.72rem;color:rgba(247,243,236,.5);background:transparent;border:1px solid rgba(247,243,236,.2);border-radius:5px;padding:5px 10px;cursor:pointer;font-family:'Noto Sans KR',sans-serif;transition:color .2s,border-color .2s;white-space:nowrap}
.btn-sm:hover{color:rgba(247,243,236,.9);border-color:rgba(247,243,236,.5)}

.ed-body{flex:1;padding:1.4rem 2rem;max-width:1100px;width:100%;margin:0 auto}
.info-panel{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:12px;margin-bottom:1.4rem}
.fg label{display:block;font-size:.67rem;font-weight:500;color:var(--ink3);letter-spacing:.07em;text-transform:uppercase;margin-bottom:5px}
.fg input{width:100%;padding:9px 13px;border:1px solid var(--border2);border-radius:6px;background:var(--paper);font-family:'Noto Sans KR',sans-serif;font-size:.88rem;color:var(--ink);outline:none;transition:border-color .2s}
.fg input:focus{border-color:var(--gold)}

.sec-label{font-size:.67rem;font-weight:500;color:var(--ink3);letter-spacing:.08em;text-transform:uppercase;margin-bottom:.7rem;display:flex;align-items:center;gap:8px}
.sec-label::after{content:'';flex:1;height:1px;background:var(--border2)}

.filter-bar{display:flex;gap:8px;margin-bottom:1rem;flex-wrap:wrap}
.search-wrap{position:relative;flex:1;min-width:180px}
.search-wrap svg{position:absolute;left:11px;top:50%;transform:translateY(-50%);width:13px;height:13px;stroke:var(--ink3);fill:none;stroke-width:2;stroke-linecap:round}
.search-wrap input{width:100%;padding:8px 12px 8px 33px;border:1px solid var(--border2);border-radius:6px;background:var(--paper);font-family:'Noto Sans KR',sans-serif;font-size:.86rem;color:var(--ink);outline:none;transition:border-color .2s}
.search-wrap input:focus{border-color:var(--gold)}
.search-wrap input::placeholder{color:var(--ink3)}
.filter-select{padding:8px 12px;border:1px solid var(--border2);border-radius:6px;background:var(--paper);font-family:'Noto Sans KR',sans-serif;font-size:.84rem;color:var(--ink);outline:none;cursor:pointer}
.filter-select:focus{border-color:var(--gold)}

.product-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(126px,1fr));gap:9px;max-height:400px;overflow-y:auto;padding-right:3px}
.product-grid::-webkit-scrollbar{width:4px}
.product-grid::-webkit-scrollbar-track{background:var(--paper2);border-radius:2px}
.product-grid::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}

.prod-card{border:1px solid var(--border2);border-radius:8px;background:var(--paper);padding:9px;cursor:pointer;transition:border-color .2s,background .15s,transform .15s;display:flex;flex-direction:column;gap:5px;position:relative}
.prod-card:hover{border-color:var(--gold);transform:translateY(-1px);background:#fdf8f0}
.prod-card.sel{border-color:var(--gold);background:#fdf6e8}
.prod-card.sel::after{content:'✓';position:absolute;top:5px;right:7px;font-size:.65rem;color:var(--gold2);font-weight:700}
.prod-img-wrap{width:100%;aspect-ratio:1/1.3;background:var(--paper2);border-radius:5px;overflow:hidden;display:flex;align-items:center;justify-content:center}
.prod-img-wrap img{width:100%;height:100%;object-fit:contain}
.prod-img-ph{font-size:2rem;color:var(--paper3)}
.prod-name{font-size:.69rem;font-weight:500;color:var(--ink);line-height:1.35}
.prod-grade{font-size:.61rem;color:var(--ink3)}
.prod-price{font-size:.67rem;color:var(--gold2);font-weight:500}

.sel-info{margin-top:.7rem;font-size:.77rem;color:var(--ink3);display:flex;align-items:center;gap:8px}
.sel-badge{background:var(--gold);color:#fff;font-size:.62rem;font-weight:700;padding:2px 8px;border-radius:99px}
.no-result{grid-column:1/-1;text-align:center;padding:2.5rem;font-size:.85rem;color:var(--ink3)}

.sel-tags{display:flex;flex-wrap:wrap;gap:6px}
.sel-tag{display:flex;align-items:center;gap:4px;background:#fdf6e8;border:1px solid var(--gold);border-radius:99px;padding:3px 8px 3px 8px;font-size:.72rem;color:var(--ink2);cursor:grab;user-select:none;transition:opacity .15s,box-shadow .15s}
.sel-tag:hover{box-shadow:0 1px 4px rgba(37,99,168,.3)}
.sel-tag-drag{font-size:.7rem;color:var(--ink3);cursor:grab}
.sel-tag-num{font-size:.62rem;font-weight:700;color:var(--gold2);min-width:12px}
.sel-tag-name{max-width:110px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sel-tag-vol{font-size:.63rem;color:var(--ink3)}
.sel-tag-arrows{display:none;gap:1px}
.sel-tag-arrow{width:18px;height:18px;border-radius:4px;background:var(--paper3);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:.65rem;color:var(--ink3);padding:0;line-height:1}
.sel-tag-arrow:hover{background:var(--gold);color:#fff}
.sel-tag-arrow:disabled{opacity:.25;cursor:default}
.sel-tag-remove{width:14px;height:14px;border-radius:50%;background:var(--paper3);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:.6rem;color:var(--ink3);line-height:1;padding:0;flex-shrink:0}
.sel-tag-remove:hover{background:var(--gold);color:#fff}
.ed-footer{background:var(--ink);padding:.9rem 2rem;display:flex;justify-content:flex-end;gap:10px;position:sticky;bottom:0}
.btn{padding:8px 18px;border-radius:6px;font-size:.83rem;font-family:'Noto Sans KR',sans-serif;font-weight:500;cursor:pointer;border:1px solid rgba(247,243,236,.25);color:var(--paper);background:transparent;transition:background .2s}
.btn:hover{background:rgba(247,243,236,.1)}
.btn-gold{background:var(--gold);border-color:var(--gold);color:#fff}
.btn-gold:hover{background:var(--gold2);border-color:var(--gold2)}

/* PROPOSAL */
#proposal{display:none;background:var(--paper);min-height:100vh}
.prop-nav{background:var(--ink);padding:.85rem 2rem;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}
.prop-nav>span{font-size:.77rem;color:rgba(247,243,236,.5)}
.prop-nav-btns{display:flex;gap:8px}
.prop-inner{max-width:860px;margin:0 auto;padding:1.2rem 2rem 3rem}
.prop-cover{
  background:var(--ink);border-radius:8px;
  padding:.8rem 1.5rem;margin-bottom:1rem;
  display:flex;align-items:center;justify-content:space-between;gap:2rem;
  -webkit-print-color-adjust:exact;print-color-adjust:exact;
}
.cover-left{display:flex;align-items:center}
.cover-main-row{display:flex;align-items:center;gap:.6rem;flex-wrap:wrap}
.cover-company{
  font-family:'Cormorant Garamond',serif;font-size:1.5rem;font-weight:600;
  color:#fff;letter-spacing:.22em;line-height:1;text-transform:uppercase;
  text-shadow:0 0 20px rgba(37,99,168,.4);
}
.cover-kanji{
  font-family:'Shippori Mincho',serif;font-size:.9rem;
  color:rgba(247,243,236,.35);letter-spacing:.08em;
}
.cover-vsep{
  width:1px;height:1.1rem;background:rgba(247,243,236,.25);flex-shrink:0;
}
.cover-biz-name{
  font-family:'Noto Serif KR',serif;font-size:1.25rem;font-weight:600;
  color:#fff;letter-spacing:.02em;line-height:1.2;
}
.cover-right{display:flex;flex-direction:column;align-items:flex-end;gap:.2rem;flex-shrink:0}
.cover-date-row{font-size:.7rem;color:rgba(247,243,236,.45)}
.cover-sales-row{display:flex;align-items:center;gap:.4rem;font-size:.88rem;font-weight:500;color:#fff}
.cover-hsep{color:rgba(247,243,236,.3);font-size:.75rem}
.p-items-grid{display:grid;grid-template-columns:1fr 1fr;gap:0 1.5rem}
.prop-item{display:grid;grid-template-columns:110px 1fr;gap:1rem;padding:.75rem 0;border-bottom:none;page-break-inside:avoid}
.prop-item:last-child{border-bottom:none}
.p-img-col{display:flex;flex-direction:column;gap:0;background:transparent!important}
.p-img-wrap{position:relative;background:transparent!important;height:200px;overflow:visible}
.p-img-wrap img{width:100%;height:200px;object-fit:contain;border-radius:5px;background:transparent;display:block}
.p-img-ph{width:100%;aspect-ratio:2/3;background:var(--paper2);border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:2rem;color:var(--paper3)}
.p-num{position:absolute;top:-7px;left:-7px;width:20px;height:20px;background:var(--ink);color:var(--paper);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.58rem;font-weight:700}
.p-img-price{text-align:center;font-size:.72rem;font-weight:600;color:var(--gold2);margin-top:.25rem;line-height:1.5}
.p-name-row{display:flex;align-items:baseline;gap:.45rem;flex-wrap:wrap;margin-bottom:.3rem}
.p-name{font-family:'Noto Serif KR',serif;font-size:1rem;font-weight:600;color:var(--ink);line-height:1.3}
.p-sub-row{display:flex;align-items:center;gap:.4rem;flex-wrap:wrap;margin-bottom:.25rem}
.p-grade{display:inline-block;padding:1px 7px;border:1px solid var(--gold);color:var(--gold2);font-size:.58rem;letter-spacing:.04em;border-radius:3px;font-weight:500;white-space:nowrap}
.p-name-jp{font-family:'Shippori Mincho',serif;font-size:.68rem;color:var(--ink3)}
.p-specs{display:flex;flex-wrap:wrap;gap:3px;margin-bottom:.4rem}
.spec-box{background:var(--paper2);border-radius:4px;padding:3px 6px;display:flex;gap:3px;align-items:baseline}
.spec-label{font-size:.52rem;color:var(--ink3);letter-spacing:.03em;text-transform:uppercase;white-space:nowrap}
.spec-val{font-size:.68rem;font-weight:500;color:var(--ink);line-height:1.2}
.spec-val.price{color:var(--gold2)}
.spec-val.wholesale{color:var(--gold);font-weight:700}
.p-desc{font-size:.63rem;color:var(--ink2);line-height:1.65;font-weight:300;border-left:1.5px solid var(--gold);padding-left:.5rem;display:-webkit-box;-webkit-line-clamp:6;-webkit-box-orient:vertical;overflow:hidden}

.prop-memo{margin-top:1.2rem;border:1px solid var(--border2);border-radius:8px;padding:1rem 1.2rem;background:rgba(37,99,168,.04)}
.price-notice{font-size:.7rem;color:var(--ink3);text-align:right;margin-bottom:.5rem;margin-top:.3rem;letter-spacing:.02em}
.prop-memo-title{font-size:.62rem;font-weight:600;color:var(--ink3);letter-spacing:.1em;text-transform:uppercase;display:flex;align-items:center;gap:8px;margin-bottom:.65rem}
.prop-memo-title::after{content:'';flex:1;height:1px;background:var(--border2)}
.prop-memo-body{font-size:.78rem;color:var(--ink2);line-height:1.75;white-space:pre-wrap;word-break:break-all;font-family:'Noto Sans KR',sans-serif}
.memo-textarea{width:100%;min-height:80px;padding:10px 13px;border:1px solid var(--border2);border-radius:6px;background:var(--paper);font-family:'Noto Sans KR',sans-serif;font-size:.86rem;color:var(--ink);outline:none;transition:border-color .2s;resize:vertical;line-height:1.65}
.memo-textarea:focus{border-color:var(--gold)}
.memo-textarea::placeholder{color:var(--ink3)}


/* ── WHOLESALE CARD LAYOUT ── */
.prop-item{display:grid;grid-template-columns:90px 1fr;gap:.8rem;padding:.7rem 0;border-bottom:.5px solid var(--border2);page-break-inside:avoid;break-inside:avoid}
.prop-item:last-child{border-bottom:none}
.p-info-col{display:flex;flex-direction:column;gap:.3rem;padding-top:.1rem}

/* 상품명 */
.p-name{font-family:'Noto Serif KR',serif;font-size:.95rem;font-weight:600;color:var(--ink);line-height:1.3}
.p-name-row{margin-bottom:.05rem}

/* 용량/본입수/납품수입사 메타 칩 */
.p-meta-row{display:flex;align-items:center;gap:.35rem;flex-wrap:wrap}
.p-meta-chip{font-size:.65rem;color:var(--ink3);background:var(--paper3);border-radius:4px;padding:2px 6px;font-weight:400}
.supplier-badge{font-size:.65rem;font-weight:700;padding:2px 8px;border-radius:99px;letter-spacing:.02em}
.supplier-sake{background:#dbeafe;color:#1a4f8a;border:1px solid #93c5fd}
.supplier-plus{background:#fee2e2;color:#991b1b;border:1px solid #fca5a5}

/* 가격 */
.p-price-row{display:flex;align-items:baseline;gap:.5rem;flex-wrap:wrap;margin:.05rem 0}
.p-price-w{font-size:1.05rem;font-weight:700;color:var(--gold);letter-spacing:.01em}
.p-price-r{font-size:.72rem;font-weight:300;color:var(--ink3)}

/* 바코드 */
.p-barcode{font-size:.6rem;color:var(--ink3);letter-spacing:.03em}
.p-barcode span{font-family:'Noto Sans KR',sans-serif;font-weight:500;color:var(--ink2);letter-spacing:.08em}

/* 스펙 칩 */
.p-specs{display:flex;flex-wrap:wrap;gap:3px;margin-top:.1rem}
.spec-box{background:var(--paper3);border-radius:4px;padding:2px 6px;display:flex;gap:3px;align-items:baseline}
.spec-label{font-size:.52rem;color:var(--ink3);letter-spacing:.03em;text-transform:uppercase;white-space:nowrap}
.spec-val{font-size:.67rem;font-weight:500;color:var(--ink);line-height:1.2}

/* 일본어명 (하단) */
.p-name-jp-bottom{font-family:'Shippori Mincho',serif;font-size:.65rem;color:var(--ink3);margin-top:.15rem;letter-spacing:.04em}

/* 이미지 */
.p-img-col{display:flex;flex-direction:column}
.p-img-wrap{position:relative;height:150px;overflow:visible;background:transparent}
.p-img-wrap img{width:100%;height:150px;object-fit:contain;background:transparent}
.p-img-ph{width:100%;height:150px;background:var(--paper2);border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:2rem;color:var(--paper3)}
.p-num{position:absolute;top:-7px;left:-7px;width:20px;height:20px;background:var(--ink);color:var(--paper);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.58rem;font-weight:700;z-index:2}

/* ── MOBILE ── */
@media(max-width:640px){
  /* 헤더 */
  .ed-header{padding:1rem}
  .ed-header h1{font-size:1rem}
  .ed-header-row{flex-wrap:wrap;gap:.5rem}
  .ed-actions{flex-wrap:wrap;gap:4px}
  .ed-meta{display:none}
  .btn-sm{font-size:.68rem;padding:4px 8px}

  /* 에디터 바디 */
  .ed-body{padding:.75rem}
  .info-panel{grid-template-columns:1fr 1fr;gap:8px}
  .fg label{font-size:.62rem}
  .fg input{padding:8px 10px;font-size:.82rem}

  /* 필터바 */
  .filter-bar{gap:6px}
  .search-wrap{min-width:0;flex:1 1 100%}
  .filter-select{flex:1;font-size:.78rem;padding:7px 8px}

  /* 상품 그리드 */
  .product-grid{
    grid-template-columns:repeat(3,1fr);
    gap:7px;
    max-height:52vw;
  }
  .prod-card{padding:7px 6px;gap:4px}
  .prod-img-wrap{aspect-ratio:1/1.2}
  .prod-name{font-size:.65rem;line-height:1.3}
  .prod-grade{font-size:.58rem}
  .prod-price{font-size:.63rem}

  /* 선택 태그 */
  .sel-tags{gap:4px}
  .sel-tag{padding:4px 7px;font-size:.7rem;gap:3px}
  .sel-tag-name{max-width:80px}
  /* 모바일: ↑↓ 버튼 보이기 */
  .sel-tag-arrows{display:flex!important}
  /* 드래그 안내 숨기기 */
  .drag-hint{display:none!important}
  .touch-hint{display:block!important}

  /* 하단 푸터 */
  .ed-footer{padding:.75rem 1rem}
  .btn{padding:7px 14px;font-size:.78rem}

  /* 제안서 뷰 */
  .prop-nav{padding:.7rem 1rem}
  .prop-nav>span{display:none}
  .prop-nav-btns{gap:5px;flex-wrap:wrap}

<script>
/* ── IndexedDB (이미지만) ── */


/* ── 상태 ── */
let allProducts = [];
let imageMap    = {};   // name → dataURL
let selected    = new Set();

/* ── 초기화: 저장된 이미지 불러오기 ── */
/* ── 도매 시트 CSV URL ── */
const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRXIrUz9nOYixf105xs9NxyABmpWptkUWGkDzr9pqxz2H78jh-8wOrSWlVu2Mff71yGUG28YbjP578f/pub?output=csv&sheet=%EB%8F%84%EB%A7%A4';
const CSV_PROXY = 'https://corsproxy.io/?' + encodeURIComponent(CSV_URL);

async function init() {
  try {
    await loadFromSheet();
    document.getElementById('loading').style.display = 'none';
    document.getElementById('editor').style.display = 'flex';
  } catch(e) {
    console.error('시트 로드 실패:', e);
    // 실패해도 에디터 보여주고 모달 띄우기
    document.getElementById('loading').style.display = 'none';
    document.getElementById('editor').style.display = 'flex';
    document.getElementById('xlsx-modal').style.display = 'flex';
  }
}

async function loadFromSheet() {
  document.getElementById('loading-txt').textContent = '도매 상품 데이터 불러오는 중...';
  const res = await fetch(CSV_PROXY);
  if (!res.ok) throw new Error('fetch 실패');
  const text = await res.text();
  allProducts = parseCSV(text);
  buildFilters();
  renderGrid(allProducts);
  document.getElementById('genmonth').value = new Date().toISOString().slice(0,7);
  document.getElementById('ed-meta').textContent = `도매 ${allProducts.length}개`;
}

function parseCSV(text) {
  // 헤더명 기반 파싱 (도매 시트 전용: 도매가/본입수/바코드 포함)
  const products = [];
  let pos = 0;

  // 헤더 행 읽기
  const headerRow = readRow();
  if (!headerRow) return products;
  const hdr = headerRow.map(h => String(h||'').trim());
  const colIdx = name => { const i = hdr.indexOf(name); return i >= 0 ? i : -1; };

  const C = {
    name:      colIdx('상품명'),
    nameJp:    colIdx('일본어 상품명'),
    vol:       colIdx('용량'),
    boniipsu:  colIdx('본입수'),
    supplier:  colIdx('납품 수입사'),
    price:     colIdx('업소가'),
    wholesale: colIdx('도매가'),
    barcode:   colIdx('바코드'),
    jujong:    colIdx('주종'),
    alc:       colIdx('ALC'),
    grade:     colIdx('등급/종류'),
    style:     colIdx('주질'),
    rice:      colIdx('정미보합'),
    ingr:      colIdx('원료'),
    region:    colIdx('생산지'),
    desc:      colIdx('상품설명'),
  };

  // 헤더가 없으면 위치 기반 폴백
  const g = (row, key, fb) => {
    const i = C[key];
    return String((i >= 0 ? row[i] : row[fb]) || '');
  };

  while (pos < text.length) {
    const row = readRow();
    if (!row) break;
    const name = g(row,'name',1).trim();
    if (!name || name === '상품명') continue;
    let rice = parseFloat(g(row,'rice',13));
    if (rice > 0 && rice < 1) rice = Math.round(rice * 100);
    else rice = Math.round(rice) || 0;
    let price     = parseInt(g(row,'price',6).replace(/[^0-9]/g,'')) || 0;
    let wholesale = parseInt(g(row,'wholesale',7).replace(/[^0-9]/g,'')) || 0;
    let alc       = parseFloat(g(row,'alc',10)) || 0;
    products.push({
      id: products.length,
      name,
      nameJp:    g(row,'nameJp',2).trim(),
      vol:       g(row,'vol',3) ? String(Math.round(parseFloat(g(row,'vol',3))||0)) : '',
      boniipsu:  g(row,'boniipsu',4).trim(),
      supplier:  g(row,'supplier',5).trim(),
      price:     price ? String(price) : '',
      wholesale: wholesale ? String(wholesale) : '',
      barcode:   g(row,'barcode',8).trim(),
      jujong:    g(row,'jujong',9).trim(),
      alc:       alc ? String(alc) : '',
      grade:     g(row,'grade',11).trim(),
      style:     g(row,'style',12).trim(),
      rice:      rice ? String(rice) : '',
      ingr:      g(row,'ingr',14).trim(),
      region:    g(row,'region',15).trim(),
      desc:      g(row,'desc',16).replace(/\n/g,'<br>').trim(),
    });
  }
  return products;

  function readRow() {
    if (pos >= text.length) return null;
    const cols = [];
    let col = '';
    while (pos < text.length) {
      const c = text[pos];
      if (c === '"') {
        pos++;
        while (pos < text.length) {
          const q = text[pos];
          if (q === '"' && text[pos+1] === '"') { col += '"'; pos += 2; }
          else if (q === '"') { pos++; break; }
          else { col += q; pos++; }
        }
      } else if (c === ',') {
        cols.push(col); col = ''; pos++;
      } else if (c === '\n') {
        cols.push(col); pos++;
        return cols;
      } else if (c === '\r') {
        pos++;
      } else {
        col += c; pos++;
      }
    }
    if (col || cols.length) { cols.push(col); return cols; }
    return null;
  }
}
function parseCSVRow(row) {
  const result = [];
  let cur = '', inQ = false;
  for (let i = 0; i < row.length; i++) {
    const c = row[i];
    if (c === '"' && row[i+1] === '"') { cur += '"'; i++; }
    else if (c === '"') { inQ = !inQ; }
    else if (c === ',' && !inQ) { result.push(cur); cur = ''; }
    else { cur += c; }
  }
  result.push(cur);
  return result;
}

/* ── 엑셀 처리 (매번) ── */
function handleXlsx(file) {
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const wb   = XLSX.read(e.target.result, {type:'array'});
      const ws   = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(ws, {header:1, defval:''});

      allProducts = [];
      for (let i = 1; i < rows.length; i++) {
        const r = rows[i];
        const name = String(r[1]||'').trim();
        if (!name) continue;

        let rice = r[8];
        if (typeof rice==='number' && rice>0 && rice<1) rice = Math.round(rice*100);
        else if (typeof rice==='number') rice = Math.round(rice);

        let price = r[6];
        if (typeof price==='number') price = Math.round(price);

        let alc = r[10];
        if (typeof alc==='number' && alc===Math.floor(alc)) alc = Math.floor(alc);

        // 시트: no|상품명|일본어상품명|용량|본입수|납품수입사|업소가|도매가|바코드|주종|ALC|등급/종류|주질|정미보합|원료|생산지|상품설명
        let wholesale = r[7]; if(typeof wholesale==='number') wholesale=Math.round(wholesale);
        let xlsxAlc = r[10]; if(typeof xlsxAlc==='number'&&xlsxAlc===Math.floor(xlsxAlc)) xlsxAlc=Math.floor(xlsxAlc);
        let xlsxRice = r[13]; if(typeof xlsxRice==='number'&&xlsxRice>0&&xlsxRice<1) xlsxRice=Math.round(xlsxRice*100); else if(typeof xlsxRice==='number') xlsxRice=Math.round(xlsxRice);
        allProducts.push({
          id: allProducts.length,
          name,
          nameJp:    String(r[2]||'').trim(),
          vol:       r[3] ? String(Math.round(Number(r[3]))) : '',
          boniipsu:  String(r[4]||'').trim(),
          supplier:  String(r[5]||'').trim(),
          price:     price ? String(price) : '',
          wholesale: wholesale ? String(wholesale) : '',
          barcode:   String(r[8]||'').trim(),
          jujong:    String(r[9]||'').trim(),
          alc:       xlsxAlc!==''&&xlsxAlc!==undefined ? String(xlsxAlc) : '',
          grade:     String(r[11]||'').trim(),
          style:     String(r[12]||'').trim(),
          rice:      xlsxRice!==''&&xlsxRice!==undefined ? String(xlsxRice) : '',
          ingr:      String(r[14]||'').trim(),
          region:    String(r[15]||'').trim(),
          desc:      String(r[16]||'').replace(/\n/g,'<br>').trim(),
        });
      }

      const now = new Date().toLocaleDateString('ko-KR',{month:'long',day:'numeric'});
      document.getElementById('xlsx-status').textContent = `✓ ${allProducts.length}개 상품 로드됨`;
      document.getElementById('xlsx-zone').classList.add('done');
      document.getElementById('btn-start').disabled = false;
      document.getElementById('ed-meta').textContent = `상품 ${allProducts.length}개 · ${now}`;
      buildFilters();
      renderGrid(allProducts);
    } catch(err) { alert('엑셀 읽기 오류: ' + err.message); }
  };
  reader.readAsArrayBuffer(file);
}

/* ── 이미지 처리 (저장) ── */
async function handleImages(files) {
  const arr = Array.from(files);
  const total = arr.length;
  let done = 0;

  document.getElementById('progress-wrap').style.display = 'block';
  document.getElementById('img-status').textContent = '';

  for (const file of arr) {
    await new Promise(res => {
      const key = file.name.replace(/\.[^.]+$/,'').trim();
      const reader = new FileReader();
      reader.onload = async ev => {
        imageMap[key] = ev.target.result;
        await put('images', {name: key, dataUrl: ev.target.result});
        done++;
        document.getElementById('progress-fill').style.width = (done/total*100)+'%';
        document.getElementById('img-status').textContent = `${done} / ${total}장 저장 중...`;
        res();
      };
      reader.readAsDataURL(file);
    });
  }

  const now = new Date().toLocaleDateString('ko-KR',{month:'long',day:'numeric'});
  await put('meta', {key:'imgInfo', count: Object.keys(imageMap).length, savedAt: now});

  document.getElementById('progress-wrap').style.display = 'none';
  document.getElementById('img-status').textContent = `✓ ${total}장 저장 완료`;
  document.getElementById('img-zone').classList.add('done');
  document.getElementById('img-saved-row').style.display = 'flex';
  document.getElementById('img-saved-txt').textContent = `이미지 ${Object.keys(imageMap).length}장 저장됨 (${now})`;
  document.getElementById('img-label').textContent = '이미지 추가 / 교체';
}

async function clearImages() {
  if (!confirm('저장된 이미지를 모두 삭제할까요?')) return;
  await clearStore('images');
  await clearStore('meta');
  imageMap = {};
  document.getElementById('img-saved-row').style.display = 'none';

  document.getElementById('img-status').textContent = '';

}

/* ── 필터 & 그리드 ── */
function buildFilters() {
  const grades = [...new Set(allProducts.map(p=>p.grade).filter(Boolean))].sort();
  const styles = [...new Set(allProducts.map(p=>p.style).filter(Boolean))].sort();
  const gSel = document.getElementById('grade-filter');
  const sSel = document.getElementById('style-filter');
  gSel.innerHTML = '<option value="">등급 전체</option>';
  sSel.innerHTML = '<option value="">주질 전체</option>';
  grades.forEach(g=>{const o=document.createElement('option');o.value=g;o.textContent=g;gSel.appendChild(o)});
  styles.forEach(s=>{const o=document.createElement('option');o.value=s;o.textContent=s;sSel.appendChild(o)});
}

function fmtPrice(raw) {
  const n = parseInt(String(raw||''));
  return n ? n.toLocaleString('ko-KR')+'원' : (raw||'');
}

function renderGrid(products) {
  const grid = document.getElementById('product-grid');
  if (!products.length) { grid.innerHTML='<div class="no-result">검색 결과가 없습니다.</div>'; return; }
  grid.innerHTML = products.map(p => {
    const idx = allProducts.indexOf(p);
    const src = findImg(p.name);
    const imgHtml = src ? `<img src="${src}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"/><span class="prod-img-ph" style="display:none">🍶</span>` : `<span class="prod-img-ph">🍶</span>`;
    return `<div class="prod-card ${selected.has(idx)?'sel':''}" onclick="toggleSelect(${idx})" data-idx="${idx}">
      <div class="prod-img-wrap">${imgHtml}</div>
      <div class="prod-name">${p.name}</div>
      <div class="prod-grade">${p.grade}</div>
      <div style="display:flex;gap:5px;align-items:center;flex-wrap:wrap">
        ${p.vol?`<span style="font-size:.62rem;color:var(--ink3)">${p.vol}ml</span>`:''}
        ${p.wholesale?`<span class="prod-price" style="color:var(--gold)">${fmtPrice(p.wholesale)}</span>`:''}
        ${p.price?`<span style="font-size:.6rem;color:var(--ink3)">${fmtPrice(p.price)}</span>`:''}
      </div>
    </div>`;
  }).join('');
}

function toggleSelect(idx) {
  if (selected.has(idx)) {
    selected.delete(idx);
    selectedOrder = selectedOrder.filter(i => i !== idx);
  } else {
    selected.add(idx);
  }
  document.querySelector(`[data-idx="${idx}"]`)?.classList.toggle('sel', selected.has(idx));
  document.getElementById('sel-badge').textContent = selected.size;
  renderSelTags();
}

// 선택 순서 배열 (드래그로 재정렬 가능)
let selectedOrder = [];

function renderSelTags() {
  const panel = document.getElementById('sel-panel');
  const container = document.getElementById('sel-tags');
  if (!selected.size) { panel.style.display = 'none'; selectedOrder = []; return; }
  // selectedOrder 동기화
  selectedOrder = selectedOrder.filter(i => selected.has(i));
  selected.forEach(i => { if (!selectedOrder.includes(i)) selectedOrder.push(i); });
  panel.style.display = 'block';
  container.innerHTML = selectedOrder.map((idx, pos) => {
    const p = allProducts[idx];
    const isFirst = pos === 0;
    const isLast = pos === selectedOrder.length - 1;
    return `<div class="sel-tag" draggable="true"
      ondragstart="dragStart(event,${pos})"
      ondragover="dragOver(event)"
      ondrop="dragDrop(event,${pos})"
      ondragend="dragEnd(event)">
      <span class="sel-tag-drag">⠿</span>
      <span class="sel-tag-num">${pos+1}</span>
      <span class="sel-tag-name">${p.name}</span>
      ${p.vol ? `<span class="sel-tag-vol">${p.vol}ml</span>` : ''}
      <span class="sel-tag-arrows">
        <button class="sel-tag-arrow" onclick="moveTag(${pos},-1)" ${isFirst?'disabled':''}>▲</button>
        <button class="sel-tag-arrow" onclick="moveTag(${pos},1)" ${isLast?'disabled':''}>▼</button>
      </span>
      <button class="sel-tag-remove" onclick="removeSelected(${idx})" title="제거">✕</button>
    </div>`;
  }).join('');
}

function removeSelected(idx) {
  selected.delete(idx);
  selectedOrder = selectedOrder.filter(i => i !== idx);
  document.querySelector(`[data-idx="${idx}"]`)?.classList.remove('sel');
  document.getElementById('sel-badge').textContent = selected.size;
  renderSelTags();
}

let dragSrcPos = null;
function dragStart(e, pos) {
  dragSrcPos = pos;
  e.target.style.opacity = '.4';
  e.dataTransfer.effectAllowed = 'move';
}
function dragOver(e) { e.preventDefault(); e.dataTransfer.dropEffect = 'move'; }
function dragDrop(e, pos) {
  e.preventDefault();
  if (dragSrcPos === null || dragSrcPos === pos) return;
  const moved = selectedOrder.splice(dragSrcPos, 1)[0];
  selectedOrder.splice(pos, 0, moved);
  renderSelTags();
}
function dragEnd(e) { dragSrcPos = null; e.target.style.opacity = '1'; renderSelTags(); }

function moveTag(pos, dir) {
  const newPos = pos + dir;
  if (newPos < 0 || newPos >= selectedOrder.length) return;
  const tmp = selectedOrder[pos];
  selectedOrder[pos] = selectedOrder[newPos];
  selectedOrder[newPos] = tmp;
  renderSelTags();
}

function filterProducts() {
  const q = document.getElementById('search').value.replace(/\s/g,'').toLowerCase();
  const g = document.getElementById('grade-filter').value;
  const s = document.getElementById('style-filter').value;
  const pr = document.getElementById('price-filter').value;
  const filtered = allProducts.filter(p => {
    const ok = !q || p.name.replace(/\s/g,'').toLowerCase().includes(q) || p.nameJp.replace(/\s/g,'').toLowerCase().includes(q);
    const gradeOk = !g || p.grade===g;
    const styleOk = !s || p.style===s;
    let priceOk = true;
    if (pr) {
      const [min, max] = pr.split('-').map(Number);
      const wPrice = parseInt(p.wholesale || p.price) || 0;
      priceOk = wPrice >= min && wPrice <= max;
    }
    return ok && gradeOk && styleOk && priceOk;
  });
  renderGrid(filtered);
}

<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>${title}</title>
<style>${css}</style>
</head>
<body>
<div class="prop-inner">
  ${coverHtml}
  <div class="price-notice">도매가 기준 / 업소가 참고 표기 (부가세 별도)</div>
  <div class="p-items-grid">${items}</div>
  ${memoText ? `<div class="prop-memo"><div class="prop-memo-title">🍶 ​MEMO</div><div class="prop-memo-body">${memoText.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}</div></div>` : ''}
</div>
</body>
</html>`;

  const blob = new Blob([doc], {type: 'text/html;charset=utf-8'});
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href     = url;
  a.download = (bizName || '도매제안서').replace(/\s+/g,'_') + '_도매제안서.html';
  a.click();
  URL.revokeObjectURL(url);
}

async function saveAsImage() {
  const bizName = document.getElementById('p-title').textContent || '제안서';

  // 인쇄용 스타일시트를 강제 적용한 임시 iframe으로 캡처
  const propInner = document.getElementById('prop-inner-wrap');

  // 로딩 표시
  const nav = document.querySelector('.prop-nav');
  const origBtns = nav.querySelector('.prop-nav-btns').innerHTML;
  nav.querySelector('.prop-nav-btns').innerHTML = '<span style="color:rgba(247,243,236,.5);font-size:.8rem">🖼 이미지 생성 중...</span>';

  try {
    // 현재 페이지의 전체 HTML을 가져와서 인쇄 모드로 렌더링
    const pageHTML = document.documentElement.outerHTML;

    // iframe 생성 (A4 너비 기준: 794px = A4 @ 96dpi)
    const iframe = document.createElement('iframe');
    iframe.style.cssText = 'position:fixed;left:-9999px;top:0;width:794px;height:auto;border:none;visibility:hidden';
    document.body.appendChild(iframe);

    const iDoc = iframe.contentDocument || iframe.contentWindow.document;
    iDoc.open();
    iDoc.write(pageHTML);
    iDoc.close();

    // iframe 내부에서 인쇄 CSS 강제 적용 + 불필요한 요소 숨기기
    await new Promise(r => setTimeout(r, 800)); // 폰트/이미지 로드 대기

    const iWin = iframe.contentWindow;
    const iBody = iDoc.body;

    // 인쇄 미디어 쿼리 시뮬레이션: @media print 스타일을 강제 적용
    const printStyle = iDoc.createElement('style');
    printStyle.textContent = `
      #editor, #setup, #loading { display:none!important; }
      #proposal { display:block!important; }
      .prop-nav { display:none!important; }
      body { background:#f0f4fa!important; }
      * { -webkit-print-color-adjust:exact!important; print-color-adjust:exact!important; }
      :root { --paper2:transparent!important; }
      .prop-inner { max-width:794px!important; margin:0 auto!important; padding:8px 16px 24px!important; }
      .prop-cover {
        background:#0f1f3d!important; border-radius:6px!important;
        padding:6px 14px!important; margin-bottom:4px!important;
        display:flex!important; align-items:center!important; justify-content:space-between!important;
      }
      #prop-inner-wrap { padding:0!important; }
      .p-items-grid { display:grid!important; grid-template-columns:1fr 1fr!important; gap:0 16px!important; }
      .prop-item {
        display:grid!important; grid-template-columns:110px 1fr!important;
        gap:8px!important; padding:10px 0 8px 10px!important;
        border-bottom:.5px solid rgba(15,31,61,0.12)!important;
        break-inside:avoid!important; overflow:visible!important;
      }
      .p-img-col { overflow:visible!important; }
      .p-img-wrap { height:160px!important; overflow:visible!important; }
      .p-img-wrap img { height:160px!important; object-fit:contain!important; }
      .p-num { position:absolute!important; top:-6px!important; left:-6px!important; z-index:2!important; }
      .p-num { background:#0f1f3d!important; color:#fff!important; border-radius:50%!important; }
      .prop-cover { -webkit-print-color-adjust:exact!important; }
      .p-grade { border:1px solid #2563a8!important; color:#1a4f8a!important; -webkit-print-color-adjust:exact!important; }
      .p-desc-bar { background:#2563a8!important; -webkit-print-color-adjust:exact!important; }
      .spec-box { background:#f0ece4!important; -webkit-print-color-adjust:exact!important; }
      .prop-memo { border:.5px solid rgba(15,31,61,0.2)!important; background:rgba(37,99,168,.04)!important; -webkit-print-color-adjust:exact!important; }
    `;
    iDoc.head.appendChild(printStyle);

    await new Promise(r => setTimeout(r, 300));

    // 캡처 대상: prop-inner-wrap
    const target = iDoc.getElementById('prop-inner-wrap');
    if (!target) throw new Error('제안서 영역을 찾을 수 없습니다.');

    const canvas = await html2canvas(target, {
      scale: 2,
      useCORS: true,
      backgroundColor: '#f0f4fa',
      logging: false,
      windowWidth: 794,
    });

    document.body.removeChild(iframe);

    const link = document.createElement('a');
    link.download = bizName.replace(/\s+/g,'_') + '_도매제안서.png';
    link.href = canvas.toDataURL('image/png');
    link.click();
  } catch(e) {
    alert('이미지 저장 중 오류가 발생했습니다.\n' + e.message);
  } finally {
    nav.querySelector('.prop-nav-btns').innerHTML = origBtns;
    // iframe 혹시 남아있으면 제거
    document.querySelectorAll('iframe').forEach(f => f.remove());
  }
}

async function refreshSheet() {
  document.getElementById('editor').style.display = 'none';
  document.getElementById('loading').style.display = 'flex';
  try {
    await loadFromSheet();
  } catch(e) {
    alert('데이터 로드 실패. 인터넷 연결을 확인해주세요.');
  }
  document.getElementById('loading').style.display = 'none';
  document.getElementById('editor').style.display = 'flex';
}

function backToEditor() {
  document.getElementById('proposal').style.display = 'none';
  document.getElementById('editor').style.display   = 'flex';
}

function resetAll() {
  selected.clear();
  document.getElementById('bizname').value          = '';
  document.getElementById('genmonth').value         = new Date().toISOString().slice(0,7);
  document.getElementById('search').value           = '';
  document.getElementById('grade-filter').value     = '';
  document.getElementById('style-filter').value     = '';
  document.getElementById('price-filter').value     = '';
  document.getElementById('memo-text').value        = '';
  selectedOrder = [];
  document.getElementById('sel-badge').textContent  = '0';
  renderSelTags();
  renderGrid(allProducts);
}

/* drag & drop */
const xlsxEl = document.getElementById('xlsx-zone');
if (xlsxEl) {
  xlsxEl.addEventListener('dragover', e => { e.preventDefault(); xlsxEl.classList.add('drag'); });
  xlsxEl.addEventListener('dragleave', () => xlsxEl.classList.remove('drag'));
  xlsxEl.addEventListener('drop', e => { e.preventDefault(); xlsxEl.classList.remove('drag'); handleXlsx(e.dataTransfer.files[0]); });
}

/* 터치 기기 감지 → ↑↓ 버튼 표시 */
(function detectTouch() {
  const isTouch = 'ontouchstart' in window || navigator.maxTouchPoints > 0;
  if (isTouch) {
    document.documentElement.classList.add('is-touch');
    // ↑↓ 버튼 강제 표시 (CSS media query 보완)
    const style = document.createElement('style');
    style.textContent = '.is-touch .sel-tag-arrows{display:flex!important} .is-touch .drag-hint{display:none!important} .is-touch .touch-hint{display:block!important}';
    document.head.appendChild(style);
  }
})();

init();
</script>
